9f-b858-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Teneb, the Harvester es un reanimador de criaturas grandes que busca llenar el cementerio rápidamente con amenazas de alto poder para devolverlas al campo de batalla de forma ventajosa. El comandante es central porque cada daño de combate que inflige activa su habilidad de reaniciar criaturas por tan solo {2}{B}, transformando el cementerio en una fuente inagotable de recursos. Las cartas clave <strong>Satyr Wayfinder</strong>, <strong>Aftermath Analyst</strong> y <strong>Grapple with the Past</strong> cumplen el rol crítico de llenar el cementerio mientras generan valor inmediato, mientras que <strong>Archon of Cruelty</strong> y <strong>Zetalpa, Primal Dawn</strong> son las amenazas finales que el mazo busca reaniciar en turnos tempranos. El ciclo es simple pero letal: mill → reanimar → ganar el juego.</p>\n\n<h4>Cómo ganar</h4>\n<p><strong>Línea 1 - Early Reanimation (Turno 3-4):</strong> Después de jugar <strong>Satyr Wayfinder</strong> o <strong>Aftermath Analyst</strong> para llenar el cementerio en turno 2, bajas <strong>Teneb</strong> en turno 3 y atacas para reaniciar <strong>Archon of Cruelty</strong> o <strong>Zetalpa, Primal Dawn</strong> del cementerio. Estas criaturas de 8 mana reanaimadas de forma gratuita son prácticamente imposibles de bloquear y fuerzan rendición en 2-3 turnos. <strong>Línea 2 - Attrition Loop:</strong> Si el juego se extiende, <strong>Teneb</strong> permite reaniciar de forma repetida criaturas con enter effects como <strong>Gray Merchant of Asphodel</strong> y <strong>Spirited Companion</strong> cada turno, generando una ventaja de recursos que es imposible de contrarrestar. <strong>Línea 3 - Primevals' Glorious Rebirth:</strong> En un late game donde tienes múltiples legendarios en el cementerio, jugar <strong>Primevals' Glorious Rebirth</strong> devuelve todo tu board de una vez, combinándolo con Teneb para una victoria inmediata.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>La mano inicial perfecta incluye dos elementos: ramp temprano y un miller/discarder. Busca combos como <strong>Elvish Mystic</strong> + <strong>Satyr Wayfinder</strong> + tierra, o <strong>Arboreal Grazer</strong> + <strong>Aftermath Analyst</strong> que te permitan jugar creatures de utilidad en turno 2 llenando el cementerio. Es crítico tener acceso a tus tres colores desde turno 1, así que incluye siempre una tierra productiva en tu cinco de cartas. Haz mulligan sin dudar si tienes solo removals y lands sin creatures tempranas, porque necesitas alcanzar turno 3 con material en el cementerio ya. Una mano como <strong>Delighted Halfling</strong>, <strong>Elvish Visionary</strong>, <strong>Grapple with the Past</strong> y dos tierras es keeper automático porque genera aceleración, valor y cementerio en los primeros turnos.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega <strong>Elvish Mystic</strong>, <strong>Delighted Halfling</strong> o <strong>Changeling Outcast</strong> como mana dorks; estos crean una cadena de maná que acelera el resto de tu plan. <strong>Turno 2:</strong> Con dos manas disponibles, juega <strong>Satyr Wayfinder</strong> o <strong>Aftermath Analyst</strong> para llenar el cementerio agresivamente mientras ganas valor (buscar tierra o dibujar cartas). Si tienes <strong>Arboreal Grazer</strong>, mete una tierra adicional para acelerar aún más. <strong>Turno 3:</strong> Este es el turno crítico: bajas <strong>Teneb, the Harvester</strong> y atacas si es posible. Aunque no hagas daño aún, el hecho de que esté en juego significa que el siguiente turno puedes reaniciar. <strong>Turno 4+:</strong> Reanima <strong>Archon of Cruelty</strong> o <strong>Zetalpa, Primal Dawn</strong> usando la habilidad de Teneb después de atacar, ganando control de tablero o daño letal. Si la partida continúa, mantén el ciclo de reaniciar criaturas con enter effects y usa <strong>Village Rites</strong> o <strong>Supernatural Stamina</strong> para alimentar el cementerio mientras generas valor.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Sinergia 1 - Mill Creatures + Teneb Reanimation:</strong> <strong>Satyr Wayfinder</strong>, <strong>Aftermath Analyst</strong> y <strong>Hermit Druid</strong> llenan el cementerio mientras crean sus propios efectos. El cementerio resultante se convierte directamente en munición para la habilidad de <strong>Teneb</strong>, permitiéndote reaniciar las amenazas más grandes sin costo adicional. Esta sinergia es el corazón del mazo porque transforma cartas que normalmente serían drawbacks en ventajas puras. <strong>Sinergia 2 - Enter Effects Loop:</strong> Criaturas como <strong>Spirited Companion</strong>, <strong>Elvish Visionary</strong> y <strong>Gray Merchant of Asphodel</strong> generan valor cuando entran al campo. Al reanicimar estas con <strong>Teneb</strong> cada turno, generas un ciclo de ventaja que crece indefinidamente: atacas con Teneb, reanimas, generas valor, sacrificas si es necesario, reanimas de nuevo. <strong>Sinergia 3 - Sacrifice Effects + Reanimation:**</strong> <strong>Village Rites</strong> y <strong>Spore Frog</strong> te permiten sacrificar criaturas que luego reanimas, creando un ciclo donde el cementerio es tu ventaja más grande. Usa <strong>Feign Death</strong> o <strong>Supernatural Stamina</strong> para doblar este efecto: devuelven a la criatura al cementerio después de morir, permitiendo que <strong>Teneb</strong> las reanime de nuevo. <strong>Sinergia 4 - Legendary Recursion:</strong> <strong>Primevals' Glorious Rebirth</strong> devuelve todos tus legendarios del cementerio simultáneamente. Combina esto con <strong>Teneb</strong> reanmando criaturas durante el turno anterior: tienes un board abrumador que ganará el juego en el siguiente ataque.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1 - Exile/Graveyard Hate (Ej: Rest in Peace, Tormod's Crypt):</strong> Este es tu enemigo número uno porque invalida completamente tu estrategia de reanimación. Responde inmediatamente con <strong>Cathar Commando</strong> (flash + sacrificio por {1}), <strong>Return to Dust</strong> (exilia dos permanentes si lo casteas en main phase) o <strong>Thrashing Brontodon</strong> (flexible y sacrificable). Mantén estos removals en mano cuando anticipes graveyard hate del adversario. <strong>Amenaza 2 - Counterspells/Spell Piracy (Ej: Force of Will, Narset's Reversal):</strong> El control puede contrarrestar tus reanimaciones clave en momentos críticos. Usa <strong>Delighted Halfling</strong> para hacer inmune a counterspell tu <strong>Teneb</strong>, y equipa <strong>Tyvar's Stand</strong> o <strong>Blacksmith's Skill</strong> en momentos críticos para hacer indestructible la criatura que estás reanmando. <strong>Amenaza 3 - Aggro/Creature Rush (Rojo/Rojo-Blanco):</strong> Los mazos agresivos pueden ganarte antes de que establezcas tu máquina de reanimación. Juega <strong>Spore Frog</strong> o <strong>Wrath of God</strong> como estabilizadores tempranos. Si tienes acceso a ellos, <strong>Austere Command</strong> es un barrido flexible que mata criaturas con mana value bajo (exacto para tokens y criaturas tempranas). Prioriza jugar defensivamente los primeros turnos con dorks que bloqueen si es necesario.</p>"}, "the_twelfth_doctor": {"commander": "The Twelfth Doctor", "commander_img": "https://cards.scryfall.io/normal/front/2/4/2400d681-05ef-43b1-b720-c15ca4226c27.jpg", "arch creature": false, "rarity": "common"}, {"name": "Rupture Spire", "scryfall_id": "c7ef4b15-efab-4255-ac2d-7794f253aa52", "img": "https://cards.scryfall.io/normal/front/c/7/c7ef4b15-efab-4255-ac2d-7794f253aa52.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped.\nWhen this land enters, sacrifice it unless you pay {1}.\n{T}: Add one mana of any color.", "colors": [], "rank": 5891, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Night Market", "scryfall_id": "a8c1dce3-6136-4294-9d2b-5ef8527d733b", "img": "https://cards.scryfall.io/normal/front/a/8/a8c1dce3-6136-4294-9d2b-5ef8527d733b.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped. As it enters, choose a color.\n{T}: Add one mana of the chosen color.\nCycling {3} ({3}, Discard this card: Draw a card.)", "colors": [], "rank": 6986, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Branch of Vitu-Ghazi", "scryfall_id": "73a8169f-b858-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>The Twelfth Doctor es un mazo de spellslinger que busca castear la mayor cantidad posible de instants y sorceries para generar valor incremental y acumular contadores en el comandante. Cada hechizo que castes desde cualquier lugar que no sea tu mano gatilla la habilidad de demostración, permitiéndote copiar el hechizo y forzar que un oponente también lo copie, generando +1/+1 en el Doctor por cada copia. Las cartas clave como <strong>Goblin Electromancer</strong>, <strong>Kessig Flamebreather</strong> y <strong>High Tide</strong> transforman cada instante y sortigia en múltiples puntos de daño, cartas adicionales y aceleración de maná. El comandante es central porque sus contadores se convierten en tu principal amenaza voltron mientras generas ventaja con cada hechizo.</p>\n\n<h4>Cómo ganar</h4>\n<p>Existen tres líneas de victoria claras en este mazo. La primera es <strong>voltron del comandante</strong>: acumular contadores en The Twelfth Doctor mediante flashbacks y copias, luego equiparlo con <strong>Blackblade Reforged</strong> y <strong>Brotherhood Regalia</strong> para volverlo imbloqueble y atacar directamente. La segunda es <strong>daño incremental por hechizos</strong>: <strong>Kessig Flamebreather</strong> y <strong>Goblin Electromancer</strong> convierten tu lluvia de instants y sorceries en un flujo constante de daño, especialmente cuando los castes desde el graveyard mediante flashback. La tercera es <strong>storm-lite con Grapeshot</strong>: acumula múltiples hechizos en un turno (usando cantrips y cartas de descarte-robo como <strong>Faithless Looting</strong> y <strong>Cathartic Reunion</strong>) para que <strong>Grapeshot</strong> se copie múltiples veces, causando daño masivo a todos los oponentes simultáneamente.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>Buscas siempre un land jugable (preferiblemente una isla y una montaña para flexibilidad), un ramp temprano como <strong>High Tide</strong> o <strong>Goblin Electromancer</strong>, y uno o dos cantrips baratos como <strong>Opt</strong>, <strong>Shock</strong> o <strong>Faithless Looting</strong>. La mano ideal contiene algo como Goblin Electromancer + Opt + Faithless Looting + 2 lands, permitiéndote castear el electromancer turno 2, hacer maná rápidamente y comenzar a generar valor inmediatamente. Si tu mano no tiene al menos un ramp o una fuente de volteo de cartas barata (CMC ≤ 2), haz mulligan sin dudar. También busca evitar manos con solo threats y sin interacción —necesitas densidad de instants/sorceries baratos para que el deck funcione correctamente desde turno 1.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega un land e idealmente castea un cantrip de CMC 1 como <strong>Opt</strong>, <strong>Shock</strong> o <strong>Crash Through</strong> para comenzar a filtrar tu biblioteca y generar información. <strong>Turno 2:</strong> Baja un ramp como <strong>Goblin Electromancer</strong> o <strong>Kessig Flamebreather</strong> y continúa con cantrips baratos; estos criaturas son puntos de partida críticos que hacen cada hechizo posterior más valioso. <strong>Turno 3:</strong> Castea The Twelfth Doctor si tienes suficiente maná disponible (especialmente si ya tienes un electromancer o flamebreather en juego), o continúa construyendo con más instants/sorceries. <strong>Turno 4+:</strong> El mazo entra en modo \"cadena de hechizos\": usa <strong>Faithless Looting</strong>, <strong>Cathartic Reunion</strong> y <strong>Think Twice</strong> para generar flashbacks y copias. Cuando castees un flashback desde el graveyard, el Doctor gatilla demostración, ganando contadores y copiando el hechizo (causando más daño si tienes <strong>Kessig Flamebreather</strong> activo). Eventualmente, equipa el Doctor con <strong>Blackblade Reforged</strong> y <strong>Brotherhood Regalia</strong> para cerrar el juego en el siguiente ataque.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Flashback + Demonstrate + Contadores:</strong> Cartas como <strong>Think Twice</strong>, <strong>Faithless Looting</strong> y <strong>Cackling Counterpart</strong> tienen flashback, permitiéndote castearlas desde el graveyard. Cuando lo haces, The Twelfth Doctor gatilla demostración, copiando la carta y ganando +1/+1. Si tienes <strong>Kessig Flamebreather</strong> en juego, cada copia es daño garantizado. Esta sinergia es el corazón del mazo porque transforma tu graveyard en una segunda mano llena de hechizos \"gratis\".</p>\n<p><strong>Cantrips + Goblin Electromancer + Voltaje:</strong> <strong>Opt</strong>, <strong>Renegade Tactics</strong>, <strong>Crash Through</strong> y otros cantrips baratos cuestan {1} menos gracias a <strong>Goblin Electromancer</strong>, permitiéndote castear múltiples hechizos por turno. Mientras más hechizos castes, más contadores ganas en el Doctor y más daño inflige <strong>Kessig Flamebreather</strong>. Esta sinergia acelera exponencialmente tu juego desde turno 2-3.</p>\n<p><strong>High Tide + Mana abundante + Storm:</strong> <strong>High Tide</strong> duplica la producción de maná de tus islas, dándote acceso a lluvia de hechizos en un solo turno. Combínalo con cantrips baratos y <strong>Grapeshot</strong>: con suficiente maná azul, castas 8-10 instants/sorceries, haciendo que <strong>Grapeshot</strong> se copie equivalentemente y dealing 30+ daño a todos los oponentes al mismo tiempo.</p>\n<p><strong>All Will Be One + Proliferate + Daño inevitable:</strong> <strong>All Will Be One</strong> convierte cada +1/+1 que ganes en The Twelfth Doctor en daño directo a un oponente. Cuando usas <strong>Experimental Augury</strong> o cantrips que generan contadores, deals daño simultáneamente. Esto es especialmente brutal cuando combinas demostración (que genera contadores) con proliferate, creando un ciclo de daño infinito si el mazo despega correctamente.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1: Removal del comandante (Swords to Plowshares, Unholy Heat).</strong> Tu principal amenaza es perder The Twelfth Doctor a instant-speed removal. Responde manteniendo contramágia en reserva: <strong>Disdainful Stroke</strong> es barato y counter muchas amenazas de CMC 4+, mientras que <strong>Rewind</strong> no solo bloquea el removal sino que untapea tus lands. Si anticipas que tu oponente tiene removal, acelera el juego con <strong>High Tide</strong> y castea múltiples hechizos antes de que puedan activarlo.</p>\n<p><strong>Amenaza 2: Counters de tu propio daño (Counterspell, Drown in the Loch).</strong> Muchos decks azules pueden contra tus instantes clave como <strong>Grapeshot</strong> o flashbacks. Mitiga esto separando tu daño: en lugar de depender de un solo <strong>Grapeshot</strong>, construye amenazas distribuidas con <strong>Kessig Flamebreather</strong> (daño por cada hechizo) y el Doctor equipado (daño por ataque). Si esperas counters, haz mulligan agresivamente para cartas de \"finales\" como equipos.</p>\n<p><strong>Amenaza 3: Decks aggro rápidos (Mono-Red, Elves).</strong> Si el juego es rápido, tu mana slow y dependencia de hechizos puede ser fatal. Responde con cartas de bloqueo como <strong>Essence Flux</strong> (que rebota tu criatura para evitar daño y genera +1/+1 si es Spirit), <strong>Abrade</strong> (remueve threats clave) y <strong>Run Away Together</strong> (devuelve dos criaturas agresivas a mano). Prioriza bajar <strong>Goblin Electromancer</strong> o <strong>Kessig Flamebreather</strong> temprano para crear un \"muro de daño reciproco\" que desalienta ataques.</p>"}, "vorel_of_the_hull_clade": {"commander": "Vorel of the Hull Clade", "commander_img": "https://cards.scryfall.io/normal/front/8/2/82c8cac8-29ce-43cc-bdb4-428c614d8545.jpg", "archetype_key": "counters", "archetype_name": "+1/+1 Counters / Proliferate", "archetype_desc": "Acumulamos +1/+1 counters. El comandante los duplica o prolifera.", "wincons": ["Simic Ascendancy a 20 contadores", "Alpha strike con criatura monstruosa", "Proliferate loop con engine de draw"], "colors": "GU", "color_pips": "🌿💧", "bracket": 1, "bracket_label": "Exhibition", "bracket_score": 1.2, "bracket_notes": ["+0.2 por manabase decente (5.0/10)", "+0.4 por CMC bajo (2.09)", "-0.4 sin staples universales (Sol Ring, Signet, Command Tower)"], "game_ch 58-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Vorel of the Hull Clade es un mazo de multiplicación exponencial de contadores basado en duplicar recursos una y otra vez hasta ganar de manera inevitable. El plan central es establecer criaturas con contadores +1/+1, usar la habilidad del comandante para duplicarlos cada turno, y permitir que el mazo escale fuera de control mientras generas valor adicional. Cartas como <strong>Simic Ascendancy</strong>, <strong>Forgotten Ancient</strong> y <strong>Zegana, Utopian Speaker</strong> son el corazón del mazo: Simic Ascendancy genera una segunda condición de victoria (20 contadores), Forgotten Ancient acumula contadores pasivamente cada turno, y Zegana nos proporciona card draw mientras se adapta. Vorel convierte cada contador en dos, lo que significa que después de unos pocos turnos tus criaturas serán prácticamente imbatibles.</p>\n\n<h4>Cómo ganar</h4>\n<p>Existen tres líneas de victoria claramente definidas en este mazo. <strong>Línea 1: Simic Ascendancy</strong> — Juega Simic Ascendancy, acumula contadores +1/+1 en cualquier criatura controlada y duplica esos contadores con Vorel cada turno. Una vez que alcances 20 contadores en total en criaturas que controlas, ganas la partida inmediatamente. <strong>Línea 2: Ataque masivo</strong> — Construye una o varias criaturas enormes usando multiplicadores de contadores (Vorel, Primal Empathy, Blackblade Reforged con muchas tierras), luego ejecuta un ataque alfa con protección usando Tyvar's Stand o Shore Up. <strong>Línea 3: Criatura monstruosa</strong> — Concentra todos los contadores en una única criatura mediante Vorel, luego usa esa criatura gigante para ganar por daño. Forgotten Ancient es perfecta para esta línea porque acumula pasivamente mientras juegas otros hechizos.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>La mano inicial perfecta incluye: un mana ramp de 1 costo (Elvish Mystic, Delighted Halfling, Arboreal Grazer), una fuente de contadores (Fertilid, Simic Ascendancy, o Forgotten Ancient), y acceso a ambos colores de maná. Ejemplos de manos mulligan-keep: (1) Elvish Mystic + Simic Ascendancy + tierra azul + tierra verde; (2) Arboreal Grazer + Forgotten Ancient + dos tierras; (3) Delighted Halfling + Fertilid + fuente de maná. Debes hacer mulligan si no tienes ramp o si tienes más de dos tierras sin hechizos de bajo costo. Evita mantener manos sin acceso claro a azul o verde, ya que necesitarás ambos colores para activar a Vorel en el turno 3-4.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega una tierra y pasa, o si tienes ramp, toca Elvish Mystic, Delighted Halfling o Traveler's Amulet para acelerar. <strong>Turno 2:</strong> Juega tu segunda tierra y un hechizo de 2 cmc como Fertilid (entra con dos contadores), Opt (para filtrar cartas), Abundant Growth (ramp + card draw), o Thirsting Roots (búsqueda flexible). <strong>Turno 3:</strong> Este es el turno crítico: baja a Vorel of the Hull Clade si tienes los cinco maná listos, o juega Zegana, Utopian Speaker / Forgotten Ancient para empezar a acumular contadores mientras te preparas para el comandante el siguiente turno. <strong>Turno 4+:</strong> Activa a Vorel tapándolo para duplicar contadores en tu mejor criatura (preferiblemente una que ya tenga 2-3 contadores), luego continúa construyendo con Simic Ascendancy o más criaturas que generen sinergias. En estos turnos, guarda mana para protección (Tyvar's Stand, Shore Up) y continúa duplicando hasta que ganar sea inevitable.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Vorel + Simic Ascendancy:</strong> Cada turno que activas a Vorel duplicando los contadores en cualquier criatura que controlas, Simic Ascendancy dispara su habilidad añadiendo más contadores. Esto crea un ciclo exponencial donde después de 3-4 activaciones de Vorel, ya tendrás 20 contadores acumulados. Es prácticamente una condición de victoria automática si Simic está en juego. <strong>Forgotten Ancient + Vorel:</strong> Forgotten Ancient acumula contadores cada turno cuando otros jugadores castean hechizos. Vorel los duplica el turno siguiente. En una partida multiplayer, esto significa que Forgotten Ancient crece cada turno sin que hagas nada, y luego multiplicas ese crecimiento exponencialmente. <strong>Zegana + cualquier generador de contadores:</strong> Zegana dispara card draw cada vez que un +1/+1 es puesto en cualquier criatura tuya. Combina esto con Primal Empathy, Quandrix Command o Planar Incision, y estás comprando cartas constantemente mientras construyes amenazas. <strong>Dramatic Reversal + Leyline of Abundance:</strong> Si tienes Dramatic Reversal con varias criaturas, Leyline of Abundance permite que desbloquees toda tu mana nuevamente. Esto te permite activar a Vorel múltiples veces en un solo turno, acelerando dramáticamente tu plan de victoria.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1: Eliminación del comandante (Swords to Plowshares, Path to Exile, etc.)</strong> — Vorel es tu motor principal, así que perderlo es devastador. Protégete guardando mana para Tyvar's Stand o Shore Up cuando juegues a Vorel. Además, considera tener Rewind o Disdainful Stroke en mano para contrarrestar spells de eliminación de alto costo antes de que lleguen a tu comandante. <strong>Amenaza 2: Aggro extremo (combos de daño rápido, criaturas volteo)</strong> — Este mazo no tiene defensas tempranas suficientes. Tu respuesta es generar contadores rápidamente en criaturas defensivas como Satyr Wayfinder o Lilysplash Mentor, asignándolas como bloqueadores. Usa Essence Flux o Planar Incision para desbloquear criaturas y regenerarlas mientras añades contadores. <strong>Amenaza 3: Counters (contra tu mazo de maná ramp o estrategia)</strong> — Tienes Syncopate, Rewind, Quandrix Command y Disdainful Stroke para defenderte contra otros counters. Cuando sea posible, protege tus hechizos críticos como Vorel usando Delighted Halfling (que hace que tu legendario no pueda ser contado) o jugando mana ramp barato que sea difícil de responder.</p>"}};

const BRACKET_COLORS = {1:'#5a5468',2:'#27ae60',3:'#f39c12',4:'#e74c3c',5:'#8b0000'};
const GAP_ICONS = {
  fast_mana:'⚡', tutor:'🔍', game_changer:'💎', manabase:'🗺', cmc:'⚖'
};

function bracketColor(b) { return BRACKET_COLORS[b] || '#fff'; }

function renderSidebar(decks) {
  const list = document.getElementById('deck-list');
  const count = document.getElementById('deck-count');
  const keys = Object.keys(decks);
  count.textContent = keys.length + ' mazo' + (keys.length !== 1 ? 's' : '');

  list.innerHTML = keys.map(key => {
    const d = decks[key];
    return `<div class="deck-nav-item" data-key="${key}" id="nav-${key}">
      <img class="deck-nav-commander-img" src="${d.commander_img}"
           onerror="this.style.display='none'" alt="">
      <div class="deck-nav-info">
        <div class="deck-nav-name">${d.commander}</div>
        <div class="deck-nav-meta">${d.archetype_name} · B${d.bracket}</div>
      </div>
      <div class="bracket-dot" style="background:${bracketColor(d.bracket)}"></div>
    </div>`;
  }).join('');
}

function renderGaps(deck) {
  const gaps = [];
  if (!deck.fast_mana || deck.fast_mana.length === 0)
    gaps.push({cat:'fast_mana', msg:'Sin fast mana — necesitas al menos 1 pieza para bracket 2'});
  if (deck.manabase_score < 3)
    gaps.push({cat:'manabase', msg:`Manabase débil (${deck.manabase_score}/10)`});
  if (deck.avg_cmc >= 4)
    gaps.push({cat:'cmc', msg:`CMC promedio alto (${deck.avg_cmc})`});
  return gaps;
}

// State for view mode and sorting
let currentSort = 'default';
let currentView = 'grid';

const TYPE_ORDER = {
  'Creature': 1, 'Artifact': 2, 'Enchantment': 3,
  'Planeswalker': 4, 'Instant': 5, 'Sorcery': 6, 'Land': 7,
};

function getTypeOrder(type) {
  if (!type) return 99;
  for (const key in TYPE_ORDER) {
    if (type.includes(key)) return TYPE_ORDER[key];
  }
  return 99;
}

function sortCards(cards, mode) {
  const arr = [...cards];
  switch (mode) {
    case 'name':
      return arr.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    case 'cmc':
      return arr.sort((a, b) => (a.cmc ?? 99) - (b.cmc ?? 99) || (a.name || '').localeCompare(b.name || ''));
    case 'cmc_desc':
      return arr.sort((a, b) => (b.cmc ?? -1) - (a.cmc ?? -1) || (a.name || '').localeCompare(b.name || ''));
    case 'type':
      return arr.sort((a, b) => getTypeOrder(a.type) - getTypeOrder(b.type) || (a.cmc ?? 99) - (b.cmc ?? 99));
    case 'rank':
      return arr.sort((a, b) => (a.rank ?? 999999) - (b.rank ?? 999999));
    case 'default':
    default:
      return arr;
  }
}

function setView(btn, view) {
  currentView = view;
  // Update toggle buttons in this panel
  const toggle = btn.closest('.view-toggle') || btn.parentElement;
  toggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
  // Apply list-mode class to all category sections in the active panel
  const panel = btn.closest('.deck-panel');
  if (panel) {
    panel.querySelectorAll('.category-section').forEach(sec => {
      sec.classList.toggle('list-mode', view === 'list');
    });
  }
}

function setSort(selectEl) {
  const mode = selectEl.value;
  currentSort = mode;
  currentView = 'grid'; // reset view on sort change
  // Re-render all panels to apply new sort
  const activePanel = document.querySelector('.deck-panel.active');
  const activeKey = activePanel ? activePanel.id.replace('panel-', '') : null;
  const panels = document.getElementById('panels');
  panels.innerHTML = '';
  Object.keys(DECK_DATA).forEach(key => {
    panels.innerHTML += renderDeckPanel(key, DECK_DATA[key]);
  });
  if (activeKey) showDeck(activeKey);
}

function renderDeckPanel(key, deck) {
  const gaps = renderGaps(deck);

  const categoriesHtml = Object.entries(deck.categories || {}).map(([cat, cards]) => {
    if (!cards || cards.length === 0) return '';
    const sorted = sortCards(cards, currentSort);
    const cardsHtml = sorted.map(c => {
      const icons = (c.role_icons || []).slice(0, 3).join('');
      const cardData = `data-name="${c.name.replace(/"/g,'&quot;')}"
               data-type="${(c.type||'').replace(/"/g,'&quot;')}"
               data-oracle="${(c.oracle||'').replace(/"/g,'&quot;')}"
               data-role="${(c.role||'').replace(/"/g,'&quot;')}"
               data-just="${(c.justification||'').replace(/"/g,'&quot;')}"`;
      const img = c.img
        ? `<img src="${c.img}" alt="${c.name}" loading="lazy"
               style="cursor:zoom-in"
               onmouseenter="showTooltip(event,this)"
               onmouseleave="hideTooltip()"
               onclick="openCardModal(this); return false;"
               ontouchend="event.preventDefault(); openCardModal(this);"
               ${cardData}>`
        : `<div style="height:196px;background:#1a1a24;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#5a5468;border:1px solid #2a2a3a">${c.name}</div>`;
      return `<div class="card-item">
        ${img}
        ${icons ? `<div class="card-roles">${icons.split('').map(i=>`<span class="role-icon">${i}</span>`).join('')}</div>` : ''}
        <div class="card-name">${c.name}</div>
      </div>`;
    }).join('');

    // Vista lista
    const rowsHtml = sorted.map(c => {
      const icons = (c.role_icons || []).slice(0, 3).join('');
      const thumb = c.img
        ? `<img class="card-list-thumb" src="${c.img}" alt="" loading="lazy">`
        : `<div class="card-list-thumb" style="background:#1a1a24"></div>`;
      const onclickAttr = c.img
        ? `onclick="openCardModal(this.querySelector('img'))" ontouchend="event.preventDefault(); openCardModal(this.querySelector('img'));"`
        : '';
      return `<div class="card-list-row" ${onclickAttr}>
        ${thumb}
        <div class="card-list-name">${c.name}</div>
        <div class="card-list-type">${c.type || ''}</div>
        <div class="card-list-cmc">${c.cmc != null ? c.cmc : '—'}</div>
        <div class="card-list-roles">${icons}</div>
      </div>`;
    }).join('');

    return `<div class="category-section">
      <div class="category-title">
        ${cat}
        <span class="category-count">${cards.length}</span>
      </div>
      <div class="card-grid">${cardsHtml}</div>
      <div class="card-list">${rowsHtml}</div>
    </div>`;
  }).join('');

  const wincons = (deck.wincons || []).map(w =>
    `<li>${w}</li>`
  ).join('');

  const bracketNotes = (deck.bracket_notes || []).map(n =>
    `<div class="bracket-note">${n}</div>`
  ).join('');

  const gapsHtml = gaps.length > 0
    ? gaps.map(g => `<div class="gap-item">
        <span class="gap-icon">${GAP_ICONS[g.cat] || '•'}</span>
        <span>${g.msg}</span>
      </div>`).join('')
    : `<div class="gap-item"><span class="gap-icon">✓</span><span style="color:#27ae60">Sin gaps detectados para bracket 2</span></div>`;

  const gameChangers = deck.game_changers && deck.game_changers.length > 0
    ? deck.game_changers.join(', ')
    : '—';
  const fastMana = deck.fast_mana && deck.fast_mana.length > 0
    ? deck.fast_mana.join(', ')
    : '—';
  const tutors = deck.tutors && deck.tutors.length > 0
    ? deck.tutors.join(', ')
    : '—';

  return `<div class="deck-panel" id="panel-${key}">
    <div class="deck-hero">
      <div class="deck-hero-bg" style="background-image:url('${deck.commander_img}')"></div>
      <div class="deck-hero-content">
        <img class="commander-portrait" src="${deck.commander_img}"
             onerror="this.style.opacity=0" alt="${deck.commander}">
        <div class="deck-hero-text">
          <h2>${deck.commander}</h2>
          <div class="deck-color-pips">${deck.color_pips}</div>
          <span class="deck-archetype-badge">${deck.archetype_name}</span>
          <span class="bracket-badge">
            <span class="b-dot" style="background:${bracketColor(deck.bracket)}"></span>
            Bracket ${deck.bracket} · ${deck.bracket_label} · ${deck.bracket_score}/5.0
          </span>
        </div>
      </div>
    </div>

    <div class="deck-content">

      <div class="section">
        <div class="stats-row">
          <div class="stat-card"><div class="stat-value">${deck.card_count}</div><div class="stat-label">Cartas</div></div>
          <div class="stat-card"><div class="stat-value">${deck.avg_cmc}</div><div class="stat-label">CMC Medio</div></div>
          <div class="stat-card"><div class="stat-value">${deck.manabase_score}</div><div class="stat-label">Manabase /10</div></div>
          <div class="stat-card"><div class="stat-value" style="color:${bracketColor(deck.bracket)}">${deck.bracket}</div><div class="stat-label">Bracket</div></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Estrategia</div>
        <div class="archetype-box">
          <div class="info-box">
            <h4>Plan del mazo</h4>
            <p>${deck.archetype_desc}</p>
          </div>
          <div class="info-box">
            <h4>Wincons</h4>
            <ul class="wincon-list">${wincons || '<li>Sin wincons definidos</li>'}</ul>
          </div>
        </div>
      </div>

      ${deck.gameplay_guide ? `
      <div class="section">
        <div class="section-title">Cómo jugar este mazo</div>
        <div class="gameplay-guide">
          ${deck.gameplay_guide}
        </div>
      </div>` : ''}

      <div class="section">
        <div class="section-title">Bracket estimado · ${deck.bracket} (${deck.bracket_label})</div>
        <div class="bracket-detail">
          <div class="bracket-item">
            <div class="bracket-item-label">Game Changers</div>
            <div class="bracket-item-value">${gameChangers}</div>
          </div>
          <div class="bracket-item">
            <div class="bracket-item-label">Fast Mana</div>
            <div class="bracket-item-value">${fastMana}</div>
          </div>
          <div class="bracket-item">
            <div class="bracket-item-label">Tutores</div>
            <div class="bracket-item-value">${tutors}</div>
          </div>
        </div>
        ${bracketNotes ? `<div class="bracket-notes">${bracketNotes}</div>` : ''}
      </div>

      <div class="section">
        <div class="section-title">Gaps para subir bracket</div>
        <div class="upgrade-box">
          ${gapsHtml}
          <div class="upgrade-cta">
            Ejecuta <code>python deck_forge.py upgrade --deck ${key}</code> para swaps y sugerencias de compra detalladas.
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Cartas del mazo</div>
        <div class="view-controls">
          <span class="view-controls-label">Vista:</span>
          <div class="view-toggle">
            <button class="active" data-view="grid" onclick="setView(this, 'grid')">Cartas</button>
            <button data-view="list" onclick="setView(this, 'list')">Lista</button>
          </div>
          <span class="view-controls-label" style="margin-left:auto">Ordenar por:</span>
          <select class="sort-select" onchange="setSort(this)">
            <option value="default">Por defecto</option>
            <option value="name">Nombre A-Z</option>
            <option value="cmc">CMC (menor)</option>
            <option value="cmc_desc">CMC (mayor)</option>
            <option value="type">Tipo</option>
            <option value="rank">Popularidad</option>
          </select>
        </div>
        ${categoriesHtml}
      </div>

    </div>
  </div>`;
}

function showDeck(key) {
  document.querySelectorAll('.deck-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.deck-nav-item').forEach(n => n.classList.remove('active'));
  const panel = document.getElementById('panel-' + key);
  const nav   = document.getElementById('nav-' + key);
  if (panel) panel.classList.add('active');
  if (nav)   nav.classList.add('active');
}

function showTooltip(e, el) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent  = el.dataset.name  || '';
  document.getElementById('tt-type').textContent  = el.dataset.type  || '';
  document.getElementById('tt-oracle').textContent= el.dataset.oracle|| '';
  document.getElementById('tt-role').textContent  = el.dataset.role  ? '⚙ ' + el.dataset.role : '';
  document.getElementById('tt-just').textContent  = el.dataset.just  || '';
  tt.classList.add('visible');
  positionTooltip(e);
}

function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 16;
  const y = e.clientY - 60;
  const maxX = window.innerWidth  - tt.offsetWidth  - 16;
  const maxY = window.innerHeight - tt.offsetHeight - 16;
  tt.style.left = Math.min(x, maxX) + 'px';
  tt.style.top  = Math.max(16, Math.min(y, maxY)) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// CARD ZOOM MODAL
function openCardModal(imgEl) {
  hideTooltip();
  const modal    = document.getElementById('card-modal');
  const modalImg = document.getElementById('card-modal-img');
  modalImg.src = imgEl.src;
  modalImg.alt = imgEl.alt || '';
  modal.classList.add('visible');
}

function closeCardModal() {
  document.getElementById('card-modal').classList.remove('visible');
}

// Cerrar con click fuera de la imagen o en la cruz
document.getElementById('card-modal').addEventListener('click', e => {
  if (e.target.id === 'card-modal' || e.target.id === 'card-modal-close') {
    closeCardModal();
  }
});

// Cerrar con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCardModal();
});

document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').classList.contains('visible')) {
    positionTooltip(e);
  }
});

function toggleSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const isOpen   = sidebar.classList.contains('open');
  sidebar.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

// (Mobile sidebar close ahora se integra dentro del listener click,
//  no redefiniendo showDeck para evitar recursion infinita)

// INIT
(function init() {
  const keys = Object.keys(DECK_DATA);
  if (keys.length === 0) {
    document.getElementById('panels').innerHTML = `
      <div class="empty-state">
        <h2>Grimorio vacío</h2>
        <p>Construye tu primer mazo con:<br>
        <code>python deck_forge.py build --commander "Nombre" ...</code></p>
      </div>`;
    document.getElementById('deck-count').textContent = '0 mazos';
    return;
  }
  renderSidebar(DECK_DATA);

  // Event delegation — single listener on sidebar, no inline onclick
  document.getElementById('deck-list').addEventListener('click', function(e) {
    const item = e.target.closest('.deck-nav-item');
    if (item && item.dataset.key) {
      e.stopPropagation();
      showDeck(item.dataset.key);
      // Cerrar sidebar en mobile tras seleccionar mazo
      if (window.innerWidth <= 768) {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sidebar-overlay');
        if (sb) sb.classList.remove('open');
        if (ov) ov.classList.remove('open');
      }
    }
  });

  const panels = document.getElementById('panels');
  keys.forEach(key => {
    panels.innerHTML += renderDeckPanel(key, DECK_DATA[key]);
  });
  showDeck(keys[0]);
})();
</script>
</body>
