<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Forge — Grimorio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0d0f;
  --bg2:      #13131a;
  --bg3:      #1a1a24;
  --border:   #2a2a3a;
  --accent:   #c9a84c;
  --accent2:  #8b6914;
  --text:     #e8e4d8;
  --text2:    #9990a0;
  --text3:    #5a5468;
  --w: #f9f6f0; --u: #4a90d9; --b: #9b59b6; --r: #e74c3c; --g: #27ae60; --c: #95a5a6;
  --bracket1: #5a5468; --bracket2: #27ae60; --bracket3: #f39c12; --bracket4: #e74c3c; --bracket5: #8b0000;
  --sidebar: 280px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 16px;
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR */
#sidebar {
  width: var(--sidebar);
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0;
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}
#sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
#sidebar-header h1 {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
#sidebar-header p {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  font-style: italic;
}
#deck-list {
  flex: 1;
  padding: 12px 0;
}
.deck-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.2s;
  text-decoration: none;
  color: var(--text2);
}
.deck-nav-item:hover { background: var(--bg3); color: var(--text); }
.deck-nav-item.active {
  border-left-color: var(--accent);
  background: var(--bg3);
  color: var(--accent);
}
.deck-nav-commander-img {
  width: 36px; height: 36px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  flex-shrink: 0;
}
.deck-nav-info { min-width: 0; }
.deck-nav-name {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.deck-nav-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.bracket-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: auto;
}

/* MAIN */
#main {
  margin-left: var(--sidebar);
  flex: 1;
  min-width: 0;
}

/* DECK PANEL */
.deck-panel {
  display: none;
  padding: 0;
}
.deck-panel.active { display: block; }

/* HERO */
.deck-hero {
  position: relative;
  height: 320px;
  overflow: hidden;
  background: var(--bg2);
}
.deck-hero-bg {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center 20%;
  filter: blur(8px) brightness(0.3) saturate(1.5);
  transform: scale(1.05);
}
.deck-hero-content {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: flex-end;
  gap: 32px;
  padding: 32px 48px;
  height: 100%;
}
.commander-portrait {
  width: 160px;
  height: 220px;
  object-fit: cover;
  object-position: top;
  border-radius: 12px;
  border: 2px solid var(--accent2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.8);
  flex-shrink: 0;
}
.deck-hero-text { padding-bottom: 8px; }
.deck-hero-text h2 {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.deck-color-pips {
  font-size: 20px;
  margin: 6px 0;
  letter-spacing: 2px;
}
.deck-archetype-badge {
  display: inline-block;
  background: rgba(201,168,76,0.15);
  border: 1px solid var(--accent2);
  color: var(--accent);
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
  margin-top: 4px;
}
.bracket-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 8px;
  margin-left: 8px;
}
.bracket-badge .b-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* CONTENT SECTIONS */
.deck-content { padding: 0 48px 64px; }

.section {
  margin-top: 40px;
}
.section-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  margin-bottom: 20px;
}

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
}
.stat-value {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--accent);
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ARCHETYPE + WINCONS */
.archetype-box {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.info-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.info-box h4 {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.info-box p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  font-style: italic;
}
.wincon-list { list-style: none; }
.wincon-list li {
  font-size: 14px;
  color: var(--text2);
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.wincon-list li:last-child { border-bottom: none; }
.wincon-list li::before {
  content: "⚡";
  font-size: 11px;
  color: var(--accent2);
}

/* BRACKET DETAIL */
.bracket-detail {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}
.bracket-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  font-size: 13px;
}
.bracket-item-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.bracket-item-value { color: var(--text); font-weight: 600; }
.bracket-notes {
  margin-top: 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
}
.bracket-note {
  font-size: 12px;
  color: var(--text3);
  padding: 3px 0;
  font-style: italic;
}

/* CARD GRID */
.category-section { margin-bottom: 32px; }
.category-title {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.category-count {
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  color: var(--text3);
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.card-item {
  position: relative;
  cursor: pointer;
}
.card-item img {
  width: 100%;
  border-radius: 8px;
  display: block;
  border: 1px solid var(--border);
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.card-item:hover img {
  transform: translateY(-4px) scale(1.03);
  border-color: var(--accent2);
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  z-index: 10;
}

/* CARD ZOOM MODAL */
.card-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.85);
  align-items: center;
  justify-content: center;
  animation: modalFadeIn 0.2s ease-out;
}
.card-modal.visible { display: flex; }
.card-modal-img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 16px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.9);
  animation: modalZoomIn 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
}
.card-modal-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.2s;
}
.card-modal-close:hover {
  background: rgba(231, 76, 60, 0.8);
  transform: scale(1.1);
}
@keyframes modalFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes modalZoomIn {
  from { transform: scale(0.4); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

/* VIEW CONTROLS (toggle grid/list + sort) */
.view-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.view-controls-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.view-toggle {
  display: flex;
  background: var(--bg3);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.view-toggle button {
  background: transparent;
  color: var(--text2);
  border: none;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s, color 0.2s;
  min-width: 60px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.view-toggle button.active {
  background: var(--accent2);
  color: var(--bg);
  font-weight: 600;
}
.view-toggle button:hover:not(.active),
.view-toggle button:active:not(.active) {
  background: var(--border);
  color: var(--text);
}
.sort-select {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  flex: 1;
  min-width: 120px;
  -webkit-appearance: none;
  appearance: none;
}
.sort-select:focus { outline: none; border-color: var(--accent2); }
@media (max-width: 768px) {
  .view-controls {
    gap: 6px;
    padding: 8px 10px;
  }
  .view-controls-label { display: none; }
  .view-toggle button { padding: 10px 16px; font-size: 14px; }
  .sort-select { font-size: 14px; padding: 10px 8px; }
}

/* LIST VIEW */
.card-list {
  display: none;
  flex-direction: column;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.category-section.list-mode .card-grid { display: none; }
.category-section.list-mode .card-list { display: flex; }

.card-list-row {
  display: grid;
  grid-template-columns: 40px 1fr 80px 60px 80px;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  cursor: zoom-in;
  transition: background 0.15s;
}
.card-list-row:last-child { border-bottom: none; }
.card-list-row:hover { background: var(--bg3); }
.card-list-thumb {
  width: 30px;
  height: 42px;
  border-radius: 3px;
  object-fit: cover;
  object-position: top;
  border: 1px solid var(--border);
}
.card-list-name {
  font-size: 13px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-list-type {
  font-size: 11px;
  color: var(--text3);
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-list-cmc {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  font-weight: 600;
}
.card-list-roles {
  font-size: 12px;
  text-align: right;
  letter-spacing: 2px;
}
@media (max-width: 768px) {
  .card-list-row { grid-template-columns: 30px 1fr 40px; gap: 8px; padding: 6px 10px; }
  .card-list-type, .card-list-roles { display: none; }
}

/* GAMEPLAY GUIDE */
.gameplay-guide {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  line-height: 1.7;
}
.gameplay-guide h4 {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent2);
  margin: 16px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.gameplay-guide h4:first-child { margin-top: 0; }
.gameplay-guide p {
  font-size: 13px;
  color: var(--text2);
  margin: 0 0 8px;
}
@media (max-width: 768px) {
  .gameplay-guide { padding: 14px 16px; }
  .gameplay-guide p { font-size: 14px; }
}

.card-name {
  font-size: 11px;
  color: var(--text2);
  text-align: center;
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-roles {
  position: absolute;
  top: 4px; right: 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.role-icon {
  background: rgba(0,0,0,0.7);
  border-radius: 3px;
  font-size: 10px;
  padding: 1px 3px;
  line-height: 1;
}

/* CARD TOOLTIP */
.card-tooltip {
  display: none;
  position: fixed;
  z-index: 1000;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  max-width: 300px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.8);
  pointer-events: none;
}
.card-tooltip.visible { display: block; }
.tooltip-name {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.tooltip-type {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 8px;
}
.tooltip-oracle {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
  font-style: italic;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 8px;
}
.tooltip-role {
  font-size: 11px;
  color: var(--accent2);
  margin-top: 6px;
}
.tooltip-justification {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-style: italic;
}

/* UPGRADE SECTION */
.upgrade-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.gap-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
}
.gap-item:last-child { border-bottom: none; }
.gap-icon { font-size: 16px; }
.upgrade-cta {
  margin-top: 16px;
  font-size: 12px;
  color: var(--text3);
  font-style: italic;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

/* EMPTY STATE */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--text3);
  text-align: center;
}
.empty-state h2 {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  color: var(--accent2);
  margin-bottom: 12px;
}
.empty-state p { font-size: 14px; line-height: 1.8; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* HAMBURGER BUTTON */
#menu-btn {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 200;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  width: 44px; height: 44px;
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
#menu-btn span {
  display: block;
  width: 20px; height: 2px;
  background: var(--accent);
  border-radius: 2px;
  transition: all 0.2s;
}
#sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

@media (max-width: 768px) {
  :root { --sidebar: 280px; }

  body { display: block; }

  /* Sidebar oculto por defecto, aparece como drawer */
  #sidebar {
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 100;
  }
  #sidebar.open {
    transform: translateX(0);
  }
  #sidebar-overlay.open {
    display: block;
  }
  #menu-btn {
    display: flex;
  }

  /* Main ocupa toda la pantalla */
  #main {
    margin-left: 0;
    width: 100%;
  }

  /* Hero: columna, más compacto */
  .deck-hero {
    height: auto;
    min-height: 200px;
  }
  .deck-hero-content {
    flex-direction: row;
    align-items: flex-end;
    padding: 16px;
    gap: 16px;
  }
  .commander-portrait {
    width: 90px;
    height: 124px;
    flex-shrink: 0;
  }
  .deck-hero-text h2 {
    font-size: 18px;
    line-height: 1.2;
  }
  .deck-color-pips { font-size: 14px; margin: 3px 0; }
  .deck-archetype-badge { font-size: 10px; }
  .bracket-badge { font-size: 11px; padding: 3px 8px; margin-left: 0; margin-top: 4px; display: flex; }

  /* Content padding */
  .deck-content { padding: 0 12px 48px; }

  /* Stats: 2 columnas */
  .stats-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-value { font-size: 18px; }

  /* Archetype boxes: 1 columna */
  .archetype-box { grid-template-columns: 1fr; gap: 12px; }

  /* Bracket detail: 1 columna */
  .bracket-detail { grid-template-columns: 1fr; gap: 8px; }

  /* Card grid: 3 columnas en móvil */
  .card-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .card-name { font-size: 10px; }

  /* Section titles más pequeños */
  .section-title { font-size: 11px; }
  .section { margin-top: 24px; }
  .category-title { font-size: 11px; }

  /* Tooltip: anchura completa en móvil */
  .card-tooltip {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    top: auto;
    max-width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 20px;
    pointer-events: auto;
    z-index: 500;
  }
  .card-tooltip.visible { display: block; }
}
</style>
</head>
<body>

<button id="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>Deck Forge</h1>

e mana of any color.", "colors": [], "rank": 8436, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Arbaaz Mir es un voltron legendario que convierte cada permanente histórico que entra en el campo en daño directo y ganancia de vida. El plan central es equipar rápidamente al comandante con armas baratas como <strong>Hookblade</strong>, <strong>Hidden Footblade</strong> y <strong>Brotherhood Regalia</strong>, mientras aprovechamos el efecto de entrada para gatillar daño y vida con cada histórico que jugamos. <strong>Flowering of the White Tree</strong> hace que Arbaaz sea prácticamente inmóvil con ward {1}, mientras que <strong>Bureau Headmaster</strong> reduce el costo de equipos en {1}, acelerando exponencialmente nuestro plan. <strong>Blackblade Reforged</strong> escala indefinidamente con cada tierra que controlemos, transformando a Arbaaz en una máquina de daño de comandante imparable.</p>\n\n<h4>Cómo ganar</h4>\n<p>La primera línea de victoria es <strong>voltron puro</strong>: equipar a Arbaaz Mir con 2-3 equipos (típicamente Hookblade para vuelo, Brotherhood Regalia para evasión y Blackblade Reforged para poder), luego atacar directamente hasta alcanzar 21 puntos de daño de comandante. Con <strong>Rising of the Day</strong> otorgando haste y +1/+0, podemos atacar en el mismo turno que bajamos a Arbaaz. La segunda línea es <strong>one-shot explosivo</strong>: usar <strong>Fists of Flame</strong> combinado con <strong>Unleash Fury</strong> después de haber dibujado varias cartas con <strong>Faithless Looting</strong> o <strong>Thrill of Possibility</strong>, duplicando el poder de Arbaaz hasta letales. La tercera opción es acumular <strong>Sticky Fingers</strong> + múltiples equipos para generar Treasures infinitos mientras el daño de entrada del comandante con históricos (Prophetic Prism, Spirited Companion, Layla Hassan) cierra la partida lentamente.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>La mano perfecta incluye: un land de mana de dos colores, <strong>Faithless Looting</strong> o <strong>Tormenting Voice</strong> (para cartearse turno 1), un equipo de CMC bajo como <strong>Hookblade</strong> o <strong>Hidden Footblade</strong>, y idealmente <strong>Bureau Headmaster</strong> para acelerar equipos. Combinaciones ganadoras turno 1-2 son: <strong>Prophetic Prism</strong> (histórico + draw) + <strong>Cathar Commando</strong> (histórico + removal flash), o <strong>Spirited Companion</strong> + <strong>Faithless Looting</strong> para dibujarte un equipo con ward. Haz mulligan sin dudar si no tienes forma de jugar turno 1 o si tu mano es puro removal sin ramp: un mazo voltron sin acceso a historicos tempranos es extremadamente lento. Evita mantener manos con solo tierras y equipos sin formas de dibujar o acelerar el mazo.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega un land + Faithless Looting o Shock si hay amenaza inmediata; el objetivo es cartearte un equipo de CMC 2. <strong>Turno 2:</strong> Land + Bureau Headmaster (reductor de costos histórico) o Prophetic Prism (histórico que dibuja), aprovechando el daño de Arbaaz incluso antes de bajar el comandante. Si sacaste un equipo turno 1, júgalo ahora. <strong>Turno 3:</strong> Este es el turno crítico: baja a <strong>Arbaaz Mir</strong>, trigarea su entrada como histórico (1 daño, 1 vida), luego equípalo con uno o dos equipos baratos usando los mana de reducción. <strong>Turnos 4+:</strong> Sigue jugando históricos (Layla Hassan, más equipos, Haunted Cloak con evasión), atacando cuando sea seguro y construyendo hacia Blackblade Reforged o multiplicadores de daño como Fists of Flame. Si el juego se prolonga, prioriza dibujar con Mentor of the Meek o Shelter mientras proteges a Arbaaz con Blacksmith's Skill o Valorous Stance.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Synergy 1 - Bureau Headmaster + Equipos baratos:</strong> Bajar Bureau Headmaster convierte tus equipos de CMC 2 en CMC 1, permitiendo jugar Brotherhood Regalia o Hookblade turno 2 sin rosario, mientras acumulas evasión y daño de entrada simultáneamente. Esto es especialmente devastador porque cada equipo barato es otro histórico que trigarea a Arbaaz. <strong>Synergy 2 - Flowering of the White Tree + Blackblade Reforged:</strong> Flowering da ward {1} a legendarios (protección de daño puntual) mientras que Blackblade escala con tierras; combinadas, Arbaaz becomes unkillable a través de daño puntual y casi imposible de bloquear. Con 6 tierras, Blackblade es +6/+6 garantizado, acercándose a voltron en 3 golpes. <strong>Synergy 3 - Sticky Fingers + Hookblade + Rising of the Day:</strong> Sticky Fingers genera Treasure cada vez que Arbaaz conecta (normalmente solo una vez), pero si juegas Hookblade (vuelo) + Rising of the Day (haste) en el mismo turno que bajas a Arbaaz, atacas \"gratis\" generando Treasure para equipos adicionales al instante. Esto crea un loop donde cada ataque financía el siguiente equipo. <strong>Synergy 4 - Faithless Looting + Fists of Flame + Unleash Fury:</strong> Dibujarse 4-5 cartas turno 2-3 con Looting (flashback) y Thrill of Possibility proporciona el combustible para Fists of Flame (que otorga +1/+0 por cada carta dibujada) multiplicado por Unleash Fury, creating burst damage de 20+ sin necesidad de atacar varias veces.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1 - Exile/Removal del comandante (Path to Exile, Swords to Plowshares, Flicker):</strong> Esta es la amenaza existencial porque pierdes tu bomba de daño y tu fuente de historicos. Responde manteniendo <strong>Blacksmith's Skill</strong> o <strong>Valorous Stance</strong> en mano después de turno 3; ambas otorgan indestructible en respuesta a removal. Si temes flicker, guarda <strong>Shelter</strong> que además dibuja. Si el daño ya está en el tablero mediante equipos, puedes permitir que saquen a Arbaaz y atacar con equipos desnudos mientras lo vuelves a jugar. <strong>Amenaza 2 - Counters y Staxes (Winter Orb, Teferi, Null Rod):</strong> Null Rod mata tu estrategia de equipos completamente; responde con <strong>Return to Dust</strong> o <strong>Cathar Commando</strong> (este último flash permite responder). Winter Orb requiere que no dependas de untap mana; juega de manera proactiva y acelera temprano con históricos que no necesitan activaciones. <strong>Amenaza 3 - Aggro desenfrenado (token swarm, infect):</strong> Tu life gain pasivo (Lunarch Veteran, Lifecreed Duo, Flowering dando +1/+1) compra turnos, pero necesitas <strong>Banishing Light</strong> o <strong>Abrade</strong> para remover amenazas específicas. Soul's Fire usando a Arbaaz como fuente de daño puede eliminar criaturas pequeñas mientras ganas tiempo; guárdala para cuando tu comandante tenga 5+ poder con equipos.</p>"}, "eivor__battle_ready": {"commander": "Eivor, Battle-Ready", "commander_img": "https://cards.scryfall.io/normal/front/4/2/4242961d-87e8-4dd2-bdea-5d765a5cf136.jpg", "archetype_key": "equipment", "archetype_name": "Equipment Voltron", "archetype_desc": "Equipamos al comandante y lo volvemos imparable. 21 daño de comandante.", "wincons": ["21 puntos de daño de comandante (voltron)", "One-shot con evasión + Swords", "Stax con equipos de protección"], "colors": "RW", "color_pips": "🔥☀", "bracket": 1, "bracket_label": "Exhibition", "bracket_score": 1.2, "bracket_notes": ["+0.2 por manabase decente (5.1/10)", "+0.4 por CMC bajo (2.07)", "-0.4 sin staples universales (Sol Ring, Signet, Command Tower)"], "game_changers": [], "fast_mana": [], "tutors": [], "combos": [], "avg_cmc": 2.07, "manabase_score": 5.06, "card_count": 100, "needed_basics": 42, "categories": {"Comandante": [{"name": "Eivor, Battle-Ready", "scryfall_id": "4242961d-87e8-4dd2-bdea-5d765a5cf136", "img": "https://cards.scryfall.io/normal/front/4/2/4242961d-87e8-4dd2-bdea-5d765a5cf136.jpg", "cmc": 5, "type": "Le erra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Branch of Vitu-Ghazi", "scryfall_id": "73a8169f-b858-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}, {"name": "Public Thoroughfare", "scryfall_id": "1f8b915f-3e82-4b05-b963-01ebff7a8f7b", "img": "https://cards.scryfall.io/normal/front/1/f/1f8b915f-3e82-4b05-b963-01ebff7a8f7b.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped.\nWhen this land enters, sacrifice it unless you tap an untapped artifact or land you control.\n{T}: Add one mana of any color.", "colors": [], "rank": 8436, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Eivor, Battle-Ready es un mazo de voltron puro que transforma al comandante en una máquina de daño mediante equipamiento masivo. La estrategia central es equipar a Eivor con la mayor cantidad posible de armas y armaduras para maximizar tanto su poder de combate como su habilidad de daño triggerada. Las cartas clave como <strong>Bureau Headmaster</strong> y <strong>Voyager Quickwelder</strong> reducen drasticamente los costos de lanzamiento y equipo, permitiéndote desplegar un arsenal completo en pocos turnos. <strong>Blackblade Reforged</strong> escala infinitamente con tus tierras, mientras que <strong>Brotherhood Regalia</strong> garantiza daño imposible de bloquear con evasión inherente. El comandante es absolutamente central: cada equipamiento que controles lo hace más letal tanto en daño directo como en penetración de defensa del oponente.</p>\n\n<h4>Cómo ganar</h4>\n<p>Línea 1 (Voltron clásico): Acumula 6-8 equipamientos sobre Eivor y ataca directamente por 21 de daño. Con <strong>Blackblade Reforged</strong> equipado en un mazo con 8+ tierras, Eivor puede alcanzar fácilmente 10+ de poder. Combina esto con <strong>Flowering of the White Tree</strong> (+2/+1 adicional) y <strong>Rising of the Day</strong> para cerrar en 2-3 ataques. Línea 2 (Daño por equipamiento): Usa la habilidad de Eivor para infligir daño directo con cada ataque. Si controlas 5+ equipamientos y atacas, causas 5+ de daño a cada oponente sin necesidad de conectar. Línea 3 (One-shot con evasión): <strong>Prowler's Helm</strong> y <strong>Brotherhood Regalia</strong> junto con <strong>Hookblade</strong> (que otorga flying) hacen a Eivor imposible de bloquear. Con <strong>Unleash Fury</strong> duplicando su poder en el último turno, logras 21+ de daño en un ataque garantizado.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>Buscas manos que contengan: (1) Una tierra de color mixto (Swamp, Mountain o Plains de tu mana base), (2) Uno de los cost-reducers: <strong>Bureau Headmaster</strong>, <strong>Voyager Quickwelder</strong> o <strong>Settlement Blacksmith</strong>, (3) Al menos 2-3 equipamientos de bajo costo como <strong>Hidden Footblade</strong>, <strong>Hookblade</strong> o <strong>Sticky Fingers</strong>. Una mano perfecta sería: tierra, <strong>Bureau Headmaster</strong>, <strong>Blacksmith's Talent</strong>, <strong>Hidden Blade</strong> y <strong>Faithless Looting</strong>. Hace mulligan sin dudar si tu mano no tiene cost-reducers: sin ellos, tu curva es demasiado lenta. Evita manos con 4+ terrenos o 0 equipamientos iniciales.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega tu tierra y pasa. Si tienes <strong>Blacksmith's Talent</strong> en mano, mantén mana abierto para flashback de <strong>Faithless Looting</strong>. <strong>Turno 2:</strong> Juega tierra segunda y lanza <strong>Bureau Headmaster</strong> o <strong>Voyager Quickwelder</strong>. Este es tu turno más crítico: el cost-reducer define tu velocidad. Si no tienes uno, juega <strong>Spirited Companion</strong> o <strong>Arbaaz Mir</strong> para dibujar cartas. <strong>Turno 3:</strong> Aquí baja Eivor si tienes 3+ equipamientos en mano o terreno. Si no, acelera con cartas de dibujado como <strong>Cathartic Reunion</strong> (descartando equipamientos para volver a robar). <strong>Turnos 4+:</strong> Con Eivor en juego y cost-reducers activos, equipa 1-2 armas por turno. Turno 5-6 atacas con 3+ equipamientos (27+ de poder combinado). Prioriza evasión (<strong>Prowler's Helm</strong>, <strong>Brotherhood Regalia</strong>) antes que poder puro si los oponentes están con buenas defensas.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Sinergia 1 - Cost Reduction Circle:</strong> <strong>Bureau Headmaster</strong> + <strong>Voyager Quickwelder</strong> en juego simultáneamente hace que equipamientos cuesten 2 mana menos en total (1 menos para lanzar + 1 menos para equipar). Jugar <strong>Blackblade Reforged</strong> por {0} y equiparlo por {5} en lugar de {7} es transformacional. <strong>Sinergia 2 - Card Draw Loop:</strong> <strong>Settlement Blacksmith</strong> dibuja cuando entra si controlas equipo. Combina con <strong>Battlefield Improvisation</strong> que permite re-equipar múltiples armas a Eivor en un turno. Esto genera una espiral: más equipos = más dibujos = más equipos. <strong>Sinergia 3 - Evasión garantizada:</strong> <strong>Prowler's Helm</strong> (no bloqueable excepto por muros) + <strong>Brotherhood Regalia</strong> (no puede ser bloqueada) + <strong>Hookblade</strong> (flying en tu turno) crean una trifecta defensiva. Eivor se vuelve inmune a bloqueos, haciendo cada ataque garantizado. <strong>Sinergia 4 - Proteción y escala:</strong> <strong>Blacksmith's Skill</strong> protege Eivor del removal mientras <strong>Blackblade Reforged</strong> escala con cada tierra que juegues. En un mazo que juega 5+ tierras adicionales, este equipo solo otorga 21+ de poder automático.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1 - Removal instantáneo del comandante:</strong> Cartas como Path to Exile, Swords to Plowshares o Counterspell eliminan a Eivor antes de que ataque. Responde preemptivamente con <strong>Blacksmith's Skill</strong> o <strong>Valorous Stance</strong> en respuesta (ambas dan indestructibilidad). Ten <strong>Shelter</strong> en mano como protección flexible que además dibuja. <strong>Amenaza 1B - Equipo destruido:</strong> Mazo de artefactos en mesa? <strong>Abrade</strong>, <strong>Cathar Commando</strong> y <strong>Return to Dust</strong> son tu respuesta. <strong>Cathar Commando</strong> es particularmente bueno porque es instantáneo en respuesta gracias a flash. <strong>Amenaza 2 - Aggro rápido:</strong> Si otro mazo te golpea antes del turno 4, pierdes. Responde con <strong>Lightning Strike</strong>, <strong>Shock</strong> y <strong>Soul's Fire</strong> (usable como remoción si Eivor ya está en juego). Prioriza eliminar criaturas problema sobre equipar; sobrevivir es ganador. <strong>Amenaza 3 - Wrath of God / Board wipe:</strong> Un board wipe destruye todo incluido Eivor. <strong>Blacksmith's Skill</strong> y <strong>Valorous Stance</strong> protegen solo una criatura. Si ves que tu oponente tiene mana abierto sospechoso, acelera agresivamente antes del turno 4 del oponente o espera a que lance el wipe y reconstruye con Eivor desde el comandante nuevamente (tienes cost-reducers para volver rápido).</p>"}, "emmara__soul_of_the_accord": {"commander": "Emmara, Soul of the Accord", "commander_img": "https://cards.scryfall.io/normal/front/e/8/e8510a1e-62ca-462c-b036-d1312729f27d.jpg", "archetype_key": "aristocrats", "archetype_name": "Tokens / Sacrifice / D d.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Rupture Spire", "scryfall_id": "c7ef4b15-efab-4255-ac2d-7794f253aa52", "img": "https://cards.scryfall.io/normal/front/c/7/c7ef4b15-efab-4255-ac2d-7794f253aa52.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped.\nWhen this land enters, sacrifice it unless you pay {1}.\n{T}: Add one mana of any color.", "colors": [], "rank": 5891, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Night Market", "scryfall_id": "a8c1dce3-6136-4294-9d2b-5ef8527d733b", "img": "https://cards.scryfall.io/normal/front/a/8/a8c1dce3-6136-4294-9d2b-5ef8527d733b.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped. As it enters, choose a color.\n{T}: Add one mana of the chosen color.\nCycling {3} ({3}, Discard this card: Draw a card.)", "colors": [], "rank": 6986, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Branch of Vitu-Ghazi", "scryfall_id": "73a8169f-b858-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}, {"name": "Public Thoroughfare", "scryfall_id": "1f8b915f-3e82-4b05-b963-01ebff7a8f7b", "img": "https://cards.scryfall.io/normal/front/1/f/1f8b915f-3e82-4b05-b963-01ebff7a8f7b.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped.\nWhen this land enters, sacrifice it unless you tap an untapped artifact or land you control.\n{T}: Add one mana of any color.", "colors": [], "rank": 8436, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Emmara, Soul of the Accord es el motor central de este mazo de tokens y drenaje incremental. Cada vez que Emmara se toca, genera un Soldado 1/1 con lifelink, lo que significa que queremos tapearla constantemente para generar un flujo imparable de criaturas. El plan es usar cartas como <strong>Mentor of the Meek</strong> y <strong>Karametra's Favor</strong> para aprovechar estos tokens: Mentor dibuja cartas cada vez que tus criaturas pequeñas entran al campo, mientras que Karametra's Favor te da maná de color fijo además de ventaja al entrar. Luego, sacrificamos estos tokens con cartas como <strong>Martial Coup</strong> o <strong>Entrapment Maneuver</strong> para generar aún más criaturas o ganar vidas mediante el lifelink. El cementerio actúa como un recurso secundario gracias a cartas como <strong>Grapple with the Past</strong> y <strong>Aftermath Analyst</strong>, permitiendo recuperar criaturas y acceder a líneas de juego alternativas cuando es necesario.</p>\n\n<h4>Cómo ganar</h4>\n<p>La primera línea de victoria es el <strong>drenaje incremental por lifelink</strong>: con suficientes tokens de Emmara atacando y siendo sacrificados, tu ganancia de vida se convierte en pérdida de vida del oponente a través del drenaje. Cartas como <strong>Impassioned Orator</strong> y <strong>Distinguished Conjurer</strong> aceleran esto ganando vida cada turno cuando tus criaturas entran. La segunda línea es el <strong>bloqueo y control del tablero</strong>: <strong>Entrapment Maneuver</strong> sacrifica criaturas atacantes enemigas mientras creas tokens equivalentes en poder, permitiéndote crear un muro de criaturas que drena lentamente mientras bloqueas indefinidamente. La tercera línea es el <strong>ataque directo con tokens masivos</strong> después de usar <strong>Martial Coup</strong> con X mayor a 5 para eliminar amenazas enemigas y crear un ejército de Soldados que ganan con ataque coordinado en 2-3 turnos.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>Tu mano ideal debe tener al menos un maná acelerador de turno 1 como <strong>Elvish Mystic</strong>, <strong>Delighted Halfling</strong> o <strong>Universal Automaton</strong>, seguido de un generador de ventaja como <strong>Karametra's Favor</strong> o <strong>Abundant Growth</strong> para turno 2. El turno 3 necesita obligatoriamente el comandante o un setup de sinergias preparadas. Por ejemplo, una mano con <strong>Elvish Mystic</strong>, <strong>Abundant Growth</strong>, Emmara, <strong>Mentor of the Meek</strong> y dos lands es perfecta. Debes hacer mulligan sin dudarlo si tienes más de 3 lands, si no tienes ramp de turno 1, o si no tienes cartas de ventaja para los primeros tres turnos. Evita quedarte sin respuestas a removal: si ves una mano sin <strong>Valorous Stance</strong>, <strong>Blacksmith's Skill</strong> o <strong>Tyvar's Stand</strong> y enfrentas mesas agresivas, considera mulligan.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega un maná acelerador como <strong>Elvish Mystic</strong>, <strong>Loam Dryad</strong> o <strong>Saruli Caretaker</strong>. Estos crean el ramp necesario para desplegar tu estrategia rápidamente. <strong>Turno 2:</strong> Juega <strong>Karametra's Favor</strong> o <strong>Abundant Growth</strong> sobre un land, obteniendo maná variable y un dibujo de carta inmediato. Alternativamente, desplega <strong>Mentor of the Meek</strong> para preparar tu motor de dibujo. <strong>Turno 3:</strong> Baja <strong>Emmara, Soul of the Accord</strong> y, si es posible, tócala ese mismo turno con <strong>Karametra's Favor</strong> o algún acelerador para generar tu primer token. <strong>Turno 4+:</strong> En cada turno, toca Emmara deliberadamente para generar tokens, usa <strong>Mentor of the Meek</strong> para dibujar cartas cuando tus pequeñas criaturas entran, y acumula recursos en el cementerio. A partir del turno 5, empieza a sacrificar tokens selectivamente con <strong>Entrapment Maneuver</strong> o prepara <strong>Martial Coup</strong> para un turno ganador cuando acumules suficiente maná.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Emmara + Karametra's Favor / Loam Dryad + Mentor of the Meek:</strong> Este es el corazón del mazo. Tócas Emmara con Karametra's Favor, generas un token 1/1, que activa Mentor of the Meek pagando {1} para dibujar una carta. Repites esto cada turno: el mismo maná que genera Karametra paga Mentor, permitiendo dibujo infinito mientras aceleras maná. Es prácticamente una máquina de ventaja.</p>\n<p><strong>Entrapment Maneuver + Impassioned Orator / Distinguished Conjurer:</strong> Cuando bloqueas un ataque con Entrapment Maneuver, sacrificas la criatura atacante y creas X tokens donde X es su toughness. Si tienes Impassioned Orator o Distinguished Conjurer en juego, cada uno de esos tokens nuevos te gana 1 vida. Con una criatura 5/5 bloqueada, generas 5 tokens y ganas 5 vidas instantáneamente, combinando defensa con ganancia de vida exponencial.</p>\n<p><strong>Grapple with the Past / Aftermath Analyst + Satyr Wayfinder / Revive the Shire:</strong> Estableces un motor de cementerio: Aftermath Analyst muele 3 cartas al entrar, Grapple with the Past retorna criaturas desde el cementerio, y Satyr Wayfinder busca lands. Esto permite jugar magia multivez al recuperar tus tokens sacrificados o criaturas de ventaja, haciendo que el cementerio sea una extensión de tu mano.</p>\n<p><strong>Martial Coup + Ausiere Command como finalizadores:</strong> Cuando acumulas suficiente maná, Martial Coup con X ≥ 5 destruye todos los demás permanentes enemigos mientras llenas tu campo de Soldados. Si la partida se extiende, Austere Command selectivamente elimina amenazas específicas (artefactos problemáticos, criaturas pequeñas del oponente) sin afectar tu tablero de Soldados, consolidando tu victoria.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1: Removimiento puntual del comandante (Sorcery speed removal como Wrath of God)</strong>. Emmara es tu motor. Si la matan constantemente, pierdes velocidad. Responde con <strong>Valorous Stance</strong>, <strong>Blacksmith's Skill</strong> o <strong>Tyvar's Stand</strong> en la pila después que se lance el removal. Mantén mana abierto en los turnos 3+ para protegerla; si un oponente tira Wrath, usa Blacksmith's Skill en respuesta para dar indestructible.</p>\n<p><strong>Amenaza 2: Counters y stax (Counterspells, winter orb, static abilities).</strong> Estos te freezean el juego. Cartas como <strong>Cathar Commando</strong> y <strong>Return to Nature</strong> destruyen artefactos de stax. Para counters en el stack, prepara <strong>Delighted Halfling</strong> en juego que protege tus legendarios de being countered (específicamente Emmara). <strong>Shelter</strong> también da protección de color contra hechizos de control selectivo.</p>\n<p><strong>Amenaza 3: Agresión rápida (Voltron, aggro, combate temprano).</strong> Eres lento turno 1-2 y vulnerable a ataque directo. <strong>Spore Frog</strong> previene todo daño de combate un turno, <strong>Entrapment Maneuver</strong> sacrifica criaturas atacantes. En el peor caso, crea bloqueos con Emmara tokens y usa <strong>Austere Command</strong> turno 6 para resetear el tablero completamente si estás en peligro de perder.</p>"}, "flubs__the_fool": {"commander": "Flubs, the Fool", "commander_img": "https://cards.scryfall.io/normal/front/4/1/41e58eb8-e5b9-4ef6-be1f-00e28cebb998.jpg", "archetype_key": "landfall", "archetype_name": "Landfall / Land Matters", "archetype_desc": "Cada tierra dispara efectos. Ramp agresivo para dominar el tablero.", "wincons": ["Scute Swarm tokens exponencial", "Aven "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Flubs, the Fool es un mazo de landfall que busca jugar tierras a una velocidad absurda, disparando efectos de entrada cada turno mientras genera ventaja de cartas masiva. La habilidad del comandante de jugar una tierra adicional cada turno es el corazón del mazo: convierte cada tierra en dos triggers de landfall, multiplicando exponencialmente tu poder. <strong>Blackblade Reforged</strong> transforma esas tierras en daño directo (cada tierra es +1/+1), <strong>Cultivator Colossus</strong> se convierte en una bomba que dibuja cartas al entrar, y <strong>Abundance</strong> convierte tu robo de cartas en búsqueda garantizada de tierras. El ciclo es: jugar tierras → gatillar landfall → generar criaturas masivas o ventaja → ganar.</p>\n\n<h4>Cómo ganar</h4>\n<p>La primera línea de victoria es por daño masivo: equipar <strong>Blackblade Reforged</strong> a una criatura evasiva (como <strong>Spitfire Lagac</strong>) y atacar mientras controlas 15-20 tierras. Cada ataque con Blackblade Reforged sobre Spitfire Lagac es 15-20 de daño, y además Spitfire Lagac hace daño directo a cada landfall. La segunda línea es por criaturas gigantes: <strong>Cultivator Colossus</strong> entra con poder igual a tu cantidad de tierras (fácilmente 12-15), dibuja tierras adicionales, gatilla más landfalls, y puedes atacar inmediatamente con <strong>Haunted Cloak</strong> otorgando haste. La tercera línea es por ventaja abrumadora: jugar suficientes tierras con Flubs para dibujar la mayoría de tu mazo con <strong>Abundance</strong>, permitiéndote resolver cualquier amenaza y gastar los oponentes en recursos.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>Buscas siempre: un ramp de 1-2 mana (<strong>Delighted Halfling</strong>, <strong>Elvish Mystic</strong>, <strong>Arboreal Grazer</strong>), al menos 2-3 tierras básicas, y un generador de ventaja como <strong>Abundance</strong>, <strong>Opt</strong> o <strong>Faithless Looting</strong>. La mano perfecta es <strong>Delighted Halfling</strong> + <strong>Arboreal Grazer</strong> + 3 tierras + <strong>Opt</strong>: juega el ramp turno 1, coloca tierra con Grazer turno 2, baja el comandante turno 3 con aceleración. Haz mulligan sin dudarlo si no tienes ramp o si tienes más de 3 tierras en mano sin generadores de ventaja. Evita manos con solo cartas caras: necesitas momentum temprano.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega <strong>Delighted Halfling</strong> o <strong>Elvish Mystic</strong> para acelerar. Si tienes <strong>Arboreal Grazer</strong>, considéralo para colocar una tierra gratis. <strong>Turno 2:</strong> Juega tu segunda tierra básica, luego lanza <strong>Faithless Looting</strong> o <strong>Opt</strong> para empezar a dibujar y filtrar. Si bajaste Grazer, coloca una tierra extra tapped. <strong>Turno 3:</strong> Baja <strong>Flubs, the Fool</strong> si tienes 4+ mana disponible. Este turno juegas tierra 1 normal + tierra 2 del comandante (dos landfall triggers), dibujando dos cartas. <strong>Turno 4+:</strong> Ahora juegas 2 tierras cada turno: juega una tierra antes de atacar, casta una segunda tierra con el comandante después de combate para gatillar landfalls defensivamente. Si tienes <strong>Cultivator Colossus</strong> o <strong>Spitfire Lagac</strong> en mano, acelera para castigarlas midgame. El objetivo es alcanzar 10+ tierras por turno 6-7.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Sinergia 1: Faithless Looting + Abundance.</strong> Faithless Looting te fuerza a descartar, pero Abundance convierte esos descartes en búsquedas de tierras. Lootea dos cartas (descartas dos), Abundance te permite elegir \"tierra\" en tu próximo robo, buscando la tierra que acabas de descartar. Esto convierte robo muerto en tutores garantizados de tierras.</p>\n<p><strong>Sinergia 2: Cultivator Colossus + Flubs entrada.</strong> Cultivator Colossus entra con poder igual a tus tierras (digamos 10). Su efecto: \"When this creature enters, you may put a land card from your hand onto the battlefield tapped.\" Luego el comandante te permite jugar una tierra adicional GRATIS. Eso son 3 tierras en un turno (una desde mano vía Colossus, una desde el comandante, una tierra básica). Cada una gatilla landfall effects: si tienes Spitfire Lagac, son 3 puntos de daño solo esta resolución.</p>\n<p><strong>Sinergia 3: Blackblade Reforged + Haunted Cloak + Crash Through.</strong> Equipa Blackblade a una criatura con Haunted Cloak (tiene vigilancia, trample, haste). La criatura es +10/+10 (10 tierras controladas). Casta Crash Through para darle trample a todas tus criaturas. Ataca: la criatura equipada pasa volteada gracias a haste, conecta todo su daño por trample, y tienes vigilancia para defender después.</p>\n<p><strong>Sinergia 4: Impulsive Pilferer + Landfall triggers.</strong> Impulsive Pilferer muere → genera Treasure (artefacto). Ese Treasure se sacrifica para mana. Con <strong>Demand Answers</strong>, <strong>Thrill of Possibility</strong> o <strong>Tormenting Voice</strong>, sacrificas el artefacto para descartar (sacando Pilfer del trigger), dibujas cartas, y esos dibujos pueden ser tierras que castas inmediatamente con el comandante.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1: Removal del comandante (exile o bounce).</strong> Flubs es tu motor principal. Responde inmediatamente con <strong>Tyvar's Stand</strong> (otorga indestructible + hexproof por un turno) si el removal es instantáneo, o espera a tener <strong>Delighted Halfling</strong> activa (hace incontrable tu próximo legendary). Si ya perdiste Flubs una vez, tienes <strong>Grapple with the Past</strong> para retornarla desde el graveyard. Guarda siempre dos mana azul para <strong>Rewind</strong> si anticipas un contador.</p>\n<p><strong>Amenaza 2: Counters masivos o control temprano.</strong> <strong>Delighted Halfling</strong> es tu respuesta: su habilidad hace incontrable tu próximo legendary (el comandante). <strong>Rewind</strong> te permite contrarrestar un counter importante mientras untapeas 4 tierras (muy sinergia). En el peor caso, juega criaturas baratas como <strong>Arboreal Grazer</strong> que no necesitan ser castas como spells (habilidad de entrada).</p>\n<p><strong>Amenaza 3: Agro rápido o daño sin bloqueo.</strong> <strong>Spore Frog</strong> previene todo daño de combate un turno (crucial contra decks agro). <strong>Shore Up</strong> y <strong>Tyvar's Stand</strong> otorgan hexproof + untap, bloqueando múltiples veces. Si necesitas ganar tiempo, casta <strong>Crash Through</strong> para que tus criaturas no puedan ser bloqueadas, o juega <strong>Thrashing Brontodon</strong> para destruir artefactos problemáticos (como equipos del oponente) mientras chequeas el tablero.</p>"}, "izoni__thousand_eyed": {"commander": "Izoni, Thousand-Eyed", "commander_img": "https://cards.scryfall.io/normal/front/9/5/95a3dfe3-88ab-4820-ae5e-2f5edd4d6f2f.jpg", "archetype_key": "aristocrats", "archetype_name": "Tokens / Sacrifice / Drain", "archetype_desc": "Tokens sacrificables, drain incremental, engine de cementerio.", "wincons": ["Drain incremental con Blood Artist / Zulaport", "Loop de sacrifice infinito", "Token flood + sac outlet"], "colors": "BG", "color_pips": "💀🌿", "bracket": 1, "bracket_label": "Exhibition", "bracket_score": 1.2, "bracket_notes": ["+0.2 por manabase decente (5.0/10)", "+0.4 por CMC bajo (2.47)", "-0.4 sin staples universales (Sol Ring, Signet, Command Tower)"], "game_changers": [], "fast_mana": [], "tutors": [], "combos": [], "avg_cmc": 2.47, "manabase_score": 5.04, "card_count": 100, "needed_basics": 43, "categories": {"Comandante": [{"name": "Izoni, Thousand-Eyed", "scryfall_id": "95a3dfe3-88ab-4820-ae5e-2f5edd4d6f2f", "img": "https://cards.scryfall.io/normal/front/9/5/95a3dfe3-88ab-4820-ae5e-2f5edd4d6f2f.jpg", "cmc": 6, "type": "Legendary Creature — Elf Shaman", "oracle": "Un "scryfall_id": "73a8169f-b858-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Izoni, Thousand-Eyed es un motor de cementerio que genera valor exponencial mediante tokens y sacrificio. El plan es llenar rápidamente el cementerio con criaturas usando <strong>Satyr Wayfinder</strong>, <strong>Aftermath Analyst</strong> y <strong>Corpse Churn</strong>, para que cuando Izoni entre al campo, genere una cantidad masiva de tokens Insecto 1/1. Luego sacrificamos esos tokens con <strong>Village Rites</strong> o la habilidad del comandante para robar cartas, ganar vida y alimentar nuestro cementerio aún más. El comandante es central porque convierte nuestro cementerio (típicamente un recurso descartado) en una ventaja de cartas permanente y tokens que alimentan el ciclo de sacrificio.</p>\n\n<h4>Cómo ganar</h4>\n<p>La victoria principal es mediante <strong>drain incremental</strong>: usamos <strong>Gray Merchant of Asphodel</strong> y <strong>Marauding Blight-Priest</strong> junto con nuestros ciclos de sacrificio y ganancia de vida para reducir gradualmente la vida de los oponentes. Cuando sacrificamos tokens con la habilidad de Izoni, ganamos vida, lo que dispara <strong>Marauding Blight-Priest</strong> para drenar 1 a cada oponente por cada vida ganada. La segunda línea de victoria es mediante <strong>Valley Rotcaller</strong> en ataque, que drena basado en la cantidad de otros tipos de criatura que controles, especialmente nuestros tokens Insecto. La tercera opción es ganar mediante <strong>Underworld Dreams</strong> si los oponentes se ven forzados a robar cartas, combinado con <strong>Abundance</strong> para que nosotros no perdamos vida pero ellos sí tomen daño.</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>Busca siempre una combinación de <strong>milling temprano + ramp + draw</strong>. Las manos ideales incluyen <strong>Elvish Mystic</strong> o <strong>Delighted Halfling</strong> (ramp turno 1), junto con <strong>Satyr Wayfinder</strong> o <strong>Aftermath Analyst</strong> (fill cementerio turno 2), y una tierra. Hace mulligan sin dudar si no tienes forma de jugar turno 1-2; esta es una ventaja crítica para nosotros. Evita manos que contengan solo <strong>Casualties of War</strong> o <strong>Meteor Golem</strong> sin ramp; estos son refinadores, no starters. Una mano con <strong>Abundant Growth</strong>, <strong>Satyr Wayfinder</strong> y dos tierras es perfecta: acelera, rellena cementerio y dibuja.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega <strong>Elvish Mystic</strong> o <strong>Delighted Halfling</strong> si puedes. Si no, pasa o juega <strong>Changeling Outcast</strong> (criatura gratis para el cementerio eventualmente). <strong>Turno 2:</strong> Invierte en <strong>Satyr Wayfinder</strong>, <strong>Aftermath Analyst</strong> o <strong>Spore Frog</strong>. Estos poblan tu cementerio mientras proporcionan valor inmediato. <strong>Turno 3:</strong> Aquí baja <strong>Izoni</strong>. En este punto deberías tener 4-6 criaturas en cementerio, generando 4-6 tokens de entrada. <strong>Turno 4+:</strong> Sacrifica tokens con <strong>Village Rites</strong> para robar, usa la habilidad de Izoni para ganar vida y robar, y juega <strong>Gray Merchant</strong> o <strong>Valley Rotcaller</strong> para iniciar el drain. Usa <strong>Grapple with the Past</strong> y <strong>Oversold Cemetery</strong> para reciclar criaturas de cementerio.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Satyr Wayfinder + Corpse Churn + Izoni:</strong> Juega Wayfinder turno 2, rellena 4 cartas (típicamente 2-3 criaturas). Luego en turno 3, antes de bajar Izoni, castea <strong>Corpse Churn</strong> (mill 3 más, retorna una criatura). Cuando Izoni entra, tienes 6+ criaturas en cementerio y generas 6+ tokens. Esto es explosivo. <strong>Village Rites + Izoni + Marauding Blight-Priest:</strong> Después de que Izoni genere tokens, sacrifica uno con Village Rites (robas 2, ganas vida). Eso gatilla Blight-Priest para drenar 1. Repite esto varias veces en un turno para drain masivo mientras refuerzas tu mano. <strong>Gray Merchant of Asphodel + Death Baron:</strong> Si tienes <strong>Death Baron</strong> en juego, tus criaturas token tienen deathtouch. Cuando Gray Merchant entra, drena basado en devoción a negro (típicamente 3-5 en este mazo), y Blight-Priest amplifica cada ganancia de vida. <strong>Oversold Cemetery + Putrid Goblin:</strong> Putrid Goblin tiene persist. Oversold Cemetery lo retorna cada turno. Esto genera un ciclo infinito de re-entrada de criaturas que alimenta <strong>Death's Presence</strong> con contadores, haciendo crecer criaturas clave como <strong>Forgotten Ancient</strong> exponencialmente.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1 - Removal del comandante (especialmente exile):</strong> Si Izoni es removida antes de entrar o es exilada al morir, pierdes acceso a tu generador de tokens. Responde con <strong>Grapple with the Past</strong> o <strong>Corpse Churn</strong> antes de bajar Izoni, para tener opciones de recuperación en cementerio. Si Izoni muere, <strong>Revive the Shire</strong> la retorna y aún genera valor al retornarla. <strong>Amenaza 2 - Counterspells y control (anti-ramp/anti-comandante):</strong> Este mazo sufre contra control azul puro. Usa <strong>Delighted Halfling</strong> como protección: sus habilidades de mana especial pueden castear Izoni sin ser countered. Alterna entre jugar <strong>Abundance</strong> (reemplaza draws para que no seas targeteable) y <strong>Assassin's Trophy</strong> para remover permanentes de control. <strong>Amenaza 3 - Aggro y daño rápido:</strong> Deck agresivos pueden ganarte antes de que despegues. <strong>Spore Frog</strong> es tu salvavidas: sacrifícalo repetidamente (con help de <strong>Oversold Cemetery</strong>) para prevenir daño de combate. <strong>Fleshbag Marauder</strong> también fuerza sacrificios en oponentes. Juega <strong>Return to Nature</strong> contra artefactos de aceleración como <strong>Patchwork Banner</strong> del oponente.</p>"}, "neriv__crackling_vanguard": {"commander": "Neriv, Crackling Vanguard", "commander_img": "https://cards.scryfall.io/normal/front/a/c/ac552ea3-f521-4c42-a846-21a73364e0ca.jpg", "archetype_key": "aristocrats", "archetype_name": "Tokens / Sacrifice / Drain", "archetype_desc": "Tokens sacrificables, drain incremental, engine de cementerio.", "wincons": ["Drain incremental con Blood Artist / Zulaport", "Loop de sacrifice infinito", "Token flood + sac outlet"], "colors": "BRW", "color_pips": "💀🔥☀", "bracket": 1, "bracket_label": "Exhibition", "bracket_score": 1.0, "bracket_notes": ["+0.2 por manabase decente (5.1/10)", "+0.2 por CMC moderado (2.59)", "-0.4 sin staples universales (Sol Ring, Signet, Command Tower)"], "game_changers": [], "fast_mana": [], "tutors": [], "combos": [], "avg_cmc": 2.59, "manabase_score": 5.06, "card_count": 100, "needed_basics": 42, "categories": {"Comandante": [{"name": "Neriv, Crackling Vanguard", "scryfall_id": "ac552ea3-f521-4c42-a846-21a73364e0ca", "img": "https://cards.scryfall.io/normal/front/a/c/ac552ea3-f521-4c42-a846-21a73364e0ca.jpg", "cmc": 5, "type": "Legendary Creature — Spirit Dragon", "oracle": "Flying, deathtouch\nWhen Neriv enters, create two 1/1 red Goblin creature tokens.\nWhenever Neriv attacks, exile a number of cards from the top of your library equal to the number of differently named t", "colors": ["B", "R", "W"], "rank": 9687, "role": "C 8/a8c1dce3-6136-4294-9d2b-5ef8527d733b.jpg", "cmc": 0, "type": "Land", "oracle": "This land enters tapped. As it enters, choose a color.\n{T}: Add one mana of the chosen color.\nCycling {3} ({3}, Discard this card: Draw a card.)", "colors": [], "rank": 6986, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "common"}, {"name": "Branch of Vitu-Ghazi", "scryfall_id": "73a8169f-b858-47a5-9c76-2e7c50ad4ecd", "img": "https://cards.scryfall.io/normal/front/7/3/73a8169f-b858-47a5-9c76-2e7c50ad4ecd.jpg", "cmc": 0, "type": "Land", "oracle": "{T}: Add {C}.\nDisguise {3} (You may cast this card face down for {3} as a 2/2 creature with ward {2}. Turn it face up any time for its disguise cost.)\nWhen this land is turned face up, add two mana of", "colors": [], "rank": 7106, "role": "Land", "justification": "Tierra de utilidad.", "roles": ["land"], "role_icons": [], "is_land": true, "is_creature": false, "rarity": "uncommon"}]}, "gameplay_guide": "<h4>Plan del mazo</h4>\n<p>Neriv, Crackling Vanguard es el corazón de un motor de tokens y sacrificios que genera ventaja incremental hasta ganar por drenaje. El mazo busca crear múltiples tokens de diferentes tipos (Goblins, Warriors, Spirits, Soldiers) cada turno, sacrificarlos estratégicamente para sacar beneficios, y exiliar cartas de la biblioteca con la habilidad del comandante para generar ventaja de recursos. Las cartas clave como <strong>Voice of Victory</strong> y <strong>Dragon Fodder</strong> alimentan constantemente el motor de tokens, mientras que <strong>All-Out Assault</strong> amplifica el daño mediante deathtouch y combates adicionales. <strong>Gray Merchant of Asphodel</strong> y <strong>Marauding Blight-Priest</strong> convierten cada token sacrificado y vida ganada en daño directo hacia los oponentes, creando una rueda de drenaje imparable.</p>\n\n<h4>Cómo ganar</h4>\n<p><strong>Victoria por drenaje incremental:</strong> El plan principal es acumular tokens con <strong>Hordeling Outburst</strong>, <strong>Martial Coup</strong> y <strong>Lingering Souls</strong>, luego sacrificarlos con <strong>Village Rites</strong> y <strong>Fleshbag Marauder</strong>. Cada sacrificio activa <strong>Marauding Blight-Priest</strong> (si controlas ganancia de vida) o simplemente genera cartas con <strong>Village Rites</strong>. Cuando atacas con Neriv, exilias cartas por el número de tipos de tokens diferentes, alimentando tu mano con <strong>Voice of Victory</strong> y <strong>Rosie Cotton of South Lane</strong> generando más tokens. <strong>Gray Merchant of Asphodel</strong> cierra los juegos drenando 5-8 vida a cada oponente en una sola entrada.</p>\n<p><strong>Victoria por daño a través de All-Out Assault:</strong> Castear <strong>All-Out Assault</strong> en turno 5 convierte todos tus tokens en amenazas letales con deathtouch, genera un combate adicional, y permite atacar dos veces en el mismo turno. Con <strong>Rising of the Day</strong> en juego, tus criaturas tienen haste, permitiendo ataques inmediatos después de ser creadas. Una segunda línea ganadora surge de acumular suficiente daño directo de <strong>Kessig Flamebreather</strong> (cada hechizo no-criatura = 1 daño) combinado con <strong>All Will Be One</strong> (cada contador = daño).</p>\n\n<h4>Mano inicial (Mulligan)</h4>\n<p>En tu mano inicial necesitas: (1) Una fuente de mana de cada color (preferentemente lands o <strong>Patchwork Banner</strong>), (2) Un generador temprano de tokens (<strong>Dragon Fodder</strong>, <strong>Hordeling Outburst</strong>, o <strong>Voice of Victory</strong>), y (3) Un card draw de bajo costo (<strong>Faithless Looting</strong>, <strong>Village Rites</strong>, o <strong>Spirited Companion</strong>). Una mano perfecta sería: tierra, <strong>Dragon Fodder</strong>, <strong>Voice of Victory</strong>, y <strong>Faithless Looting</strong> — esto permite generar 4 tokens diferentes en los primeros 3 turnos y activar rápidamente la habilidad de exilio de Neriv.</p>\n<p>Haz mulligan sin dudar si tienes más de 3 tierras o menos de 2. Evita manos sin generadores de tokens en los primeros 4 turnos, porque el mazo depende del momentum. Si tienes <strong>All-Out Assault</strong> sin manera de jugar antes del turno 5, considera mulligan.</p>\n\n<h4>Curva de juego ideal</h4>\n<p><strong>Turno 1:</strong> Juega tu tierra y pasa. Si tienes <strong>Impulsive Pilferer</strong> o <strong>Kessig Flamebreather</strong>, considera castearlos aquí para tener presencia temprana.</p>\n<p><strong>Turno 2:</strong> Juega <strong>Dragon Fodder</strong> o <strong>Faithless Looting</strong>. Si ya controlabas una criatura, <strong>Voice of Victory</strong> es ideal aquí — genera 2 tokens y los anima, sumando velocidad. Esto comienza tu motor.</p>\n<p><strong>Turno 3:</strong> Castea <strong>Hordeling Outburst</strong> o <strong>Lingering Souls</strong>. Ahora controlas Goblins, Warriors, y Spirits — tres tipos diferentes. Sacrifica uno con <strong>Village Rites</strong> (dibuja 2 cartas) para generar más recursos. Este es el turno donde el motor comienza a acelerar.</p>\n<p><strong>Turno 4:</strong> Castea Neriv. Con 3+ tipos de tokens diferentes en juego, la habilidad de entrada genera 2 Goblins más, expandiendo tu presencia. Ahora tienes 4+ tokens distintos listos.</p>\n<p><strong>Turno 5+:</strong> Ataca con Neriv — exilias 4+ cartas de la biblioteca que juegas inmediatamente (especialmente si incluyen generadores de tokens). Castea <strong>All-Out Assault</strong> o <strong>Martial Coup</strong> para generar una segunda ola de tokens. Sacrifica múltiples tokens con <strong>Fleshbag Marauder</strong> o encadenadas de <strong>Village Rites</strong>. Juega <strong>Gray Merchant of Asphodel</strong> para drenar 6-8 vida, ganando puntos de vida que <strong>Marauding Blight-Priest</strong> convierte en daño. Cierra el juego el turno 6-7.</p>\n\n<h4>Sinergias clave</h4>\n<p><strong>Sinergia 1 — Voice of Victory + Dragon Fodder + Neriv:</strong> <strong>Voice of Victory</strong> crea 2 Warriors tapped and attacking cada turno que atacas. <strong>Dragon Fodder</strong> crea 2 Goblins. Neriv crea 2 más al entrar. Esto da 3 tipos de tokens inmediatos. Cuando atacas con Neriv en turno 4-5, exilias 3+ cartas automáticamente, alimentando tu mano mientras expandes tu presencia. Es especialmente poderoso porque Voice of Victory mantiene token diversity y presión simultáneamente.</p>\n<p><strong>Sinergia 2 — Village Rites + Fleshbag Marauder + Oversold Cemetery:</strong> <strong>Village Rites</strong> sacrifica tokens por card draw (2 cartas por 1 token). <strong>Fleshbag Marauder</strong> entra, fuerza a todos sacrificar criaturas. <strong>Oversold Cemetery</strong> (con 4+ criaturas en cementerio) devuelve una criatura cada turno. Esto crea un ciclo: sacrificas token con Rites (dibuja 2), juegas Fleshbag (obliga sacrificios), devuelves con Cemetery. Cada ciclo acelera tu mano mientras reduce los recursos de los oponentes.</p>\n<p><strong>Sinergia 3 — Gray Merchant + Marauding Blight-Priest + Rosie Cotton:</strong> <strong>Rosie Cotton</strong> crea un Food token al entrar y otorga beneficio cada vez que creates un token (+1/+1 a una criatura). <strong>Marauding Blight-Priest</strong> convierte cada ganancia de vida en daño a oponentes. Cuando <strong>Gray Merchant</strong> entra con 4+ devotion a negro, gana 6+ vida, activando Blight-Priest 6+ veces (6+ daño a cada oponente). Con <strong>Rosie Cotton</strong> generando Treasures y Foods mientras generas tokens, creas un drenaje exponencial en un solo turno.</p>\n<p><strong>Sinergia 4 — All-Out Assault + Rising of the Day + Martial Coup:</strong> <strong>All-Out Assault</strong> da +1/+1 y deathtouch a todas tus criaturas, además genera un combate adicional. <strong>Rising of the Day</strong> otorga haste. <strong>Martial Coup</strong> castea con X=5+ para crear 5 Soldiers Y destruir todas las demás criaturas de los oponentes. En el turno que juegas esto: Coup destruye defensa, Rising of the Day anima instantemente, All-Out Assault permite ataque adicional con deathtouch. Dos combates con 5+ criaturas, ambas con deathtouch = juego ganado prácticamente garantizado.</p>\n\n<h4>Amenazas y cómo responder</h4>\n<p><strong>Amenaza 1 — Removal del comandante (Swords to Plowshares, Counterspells):</strong> Si tu Neriv es removido o contrarrestado antes de atacar, pierdes la ventaja de exilio y el motor se ralentiza. <strong>Respuesta:</strong> Mantén <strong>Blacksmith's Skill</strong> en mano después del turno 4 — da hexproof e indestructible por 1 mana rojo/blanco. Juega interactivamente: no bajes Neriv si hay 3+ mana azul abierto en la mesa. Usa <strong>Lingering Souls</strong> y <strong>Dragon Fodder</strong> antes de Neriv para alimentar valor independiente. <strong>Impulsive Pilferer</strong> genera Treasures si es removido, permitiendo reintentos rápidos de Neriv.</p>\n<p><strong>Amenaza 2 — Aggro deck rápido (Mono Rojo, Goblins, Elves):</strong> Estos mazos ganan antes del turno 5-6, cuando tu motor alcanza velocidad de crucero. <strong>Respuesta:</strong> Prioriza <strong>Terminate</strong>, <strong>Bedevil</strong>, y <strong>Fleshbag Marauder</strong> como removes interactivos. <strong>Martial Coup</strong> con X=5+ barre la mesa completa. Si ves aggro en turno 1, juega <strong>Oversold Cemetery</strong> (cuesta 2, absorbe daño futuro) y mantén <strong>Village Rites</strong> para drenar rápidamente sus tokens. <strong>Marauding Blight-Priest</strong> debe estar en juego turno 3 si enfrentas aggro — convierte tu ganancia de vida en daño ofensivo.</p>\n<p><strong>Amenaza 3 — Control con board wipes (Supreme Verdict, Cyclonic Rift):</strong> Un board wipe destruye tu inversión de tokens y ralentiza el motor fatalmente. <strong>Respuesta:</strong> Mantén <strong>Oversold Cemetery</strong> en juego para recuperar criaturas después de la limpieza. <strong>Faithless Looting</strong> y <strong>Cathartic Reunion</strong> permiten descartar criaturas estratégicamente antes del wipe, luego recuperarlas con Cemetery o <strong>Hordeling Outburst"}, "teneb__the_harvester": {"commander": "Teneb, the Harvester", "commander_img": "https://cards.scryfall.io/normal/front/f/3/f3c1b26c-97f0-4e7e-8744-8497a83a11ab.jpg", "archetype_key": "reanimator", "archetype_name": "Reanimator / Graveyard", "archetype_desc": "Criaturas enormes desde el cementerio a coste cero de maná.", "wincons": ["Criatura 8+ en turno 3-4", "Sheoldred / Grave Titan loop", "Entomb + Reanimate turn 1"], "colors": "BGW", "color_pips": "💀🌿☀", "bracket": 1, "bracket_label": "Exhibition", "bracket_score": 1.0, "bracket_notes": ["+0.4 por CMC bajo (2.45)", "-0.4 sin staples universales (Sol Ring, Signet, Command Tower)"], "game_changers": [], "fast_mana": [], "tutors": [], "combos": [], "avg_cmc": 2.45, "manabase_score": 4.98, "card_count": 100, "needed_basics": 46, "categories": {"Comandante": [{"name": "Teneb, the Harvester", "scryfall_id": "f3c1b26c-97f0-4e7e-8744-8497a83a11ab", "img": "https://cards.scryfall.io/normal/front/f/3/f3c1b26c-97f0-4e7e-8744-8497a83a11ab.jpg", "cmc": 6, "type": "Legendary Creature — Dragon", "oracle": "Flying\nWhenever Teneb deals combat damage to a player, you may pay {2}{B}. If you do, put target creature card from a graveyard onto the battlefield under your control.", "colors": ["B", "G", "W"], "rank": 7772, "role": "Commander", "justification": "El motor del mazo.", "roles": ["threat", "payoff_reanimator"], "role_icons": ["⚔", "💀"], "is_land": false, "is_creature": true, "rarity": "rare"}], "Ramp": [{"name": "Elvish Mystic", "scryfall_id": "75918859-c93f-41b4-9ad0-a4a96c389f0d", "img": "https://cards.scryfall.io/normal/front/7/5/75918859-c93f-41b4-9ad0-a4a96c389f0d.jpg", "cmc": 1, "type": "Creature — Elf Druid", "oracle": "{T}: Add {G}.", "colors": ["G"], "rank": 109, "role": "Ramp", "justification": "[CRITIC] Seleccionada por análisis holístico.", "roles": ["ra
